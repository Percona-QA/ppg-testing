---
# Start/restart the PostgreSQL service; on failure, print journalctl for the
# unit plus every *.log file under the OS's postgres log tree, then fail the
# play explicitly (register + ignore_errors would otherwise swallow it).
#
# Caller must set:
#   svc_name  - systemd unit name, e.g. "postgresql-16"
#   svc_state - started or restarted

- name: Start/restart {{ svc_name }}
  ansible.builtin.service:
    name: "{{ svc_name }}"
    state: "{{ svc_state }}"
    enabled: true
  register: __pg_result
  ignore_errors: true

- name: Diagnose {{ svc_name }} failure
  when: __pg_result is failed
  block:
    - name: Dump journalctl for {{ svc_name }}
      ansible.builtin.include_tasks: dump_journalctl.yml
      vars:
        journal_unit: "{{ svc_name }}"

    - name: Dump postgres logs
      ansible.builtin.include_tasks: dump_logs.yml
      vars:
        log_search_dir: >-
          {{ '/var/lib/pgsql' if ansible_os_family == 'RedHat'
             else '/var/log/postgresql' }}

- name: Fail if {{ svc_name }} did not reach the expected state
  ansible.builtin.fail:
    msg: >-
      {{ svc_name }} failed to reach state={{ svc_state }}:
      {{ __pg_result.msg | default('see diagnostics above') }}
  when: __pg_result is failed
