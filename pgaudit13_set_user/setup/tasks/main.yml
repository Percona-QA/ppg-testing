---
- name: Set Facts - Major version
  set_fact:
    major_version: "{{ lookup('env', 'VERSION').split('.')[0].split('-')[1] }}"
    pg_version_to_install: "{{ lookup('env', 'VERSION') | replace('ppg-','') }}"
    cacheable: true

- name: Configure repository
  include_tasks: ../../../../tasks/enable_repo.yml

# - name: setup epel release
#   yum:
#     name: epel-release
#     update_cache: yes
#     state: present

# - name: Enable dnf-plugins-core
#   become: true
#   command: sudo dnf install dnf-plugins-core

# - name: Enable crb on rocky linux 9
#   become: true
#   command: dnf config-manager --set-enabled crb

- name: install Percona Platform for PostgreSQL rpm packages
  yum:
    name: "{{ packages }}"
    state: latest
    update_cache: yes
  vars:
    packages:
    - percona-postgresql-client-common
    - percona-postgresql-common
    - percona-postgresql-common-dev
    - percona-postgresql{{ major_version }}
    - percona-postgresql{{ major_version }}-contrib
    - percona-postgresql{{ major_version }}-devel
    - percona-postgresql{{ major_version }}-libs
    - percona-postgresql{{ major_version }}-llvmjit
    - percona-postgresql{{ major_version }}-plperl
    - percona-postgresql{{ major_version }}-plpython3
    - percona-postgresql{{ major_version }}-pltcl
    - percona-postgresql{{ major_version }}-server
    - percona-postgresql{{ major_version }}-test
    - openssl-devel
    - gcc
    - readline-devel
    - make
    - redhat-rpm-config
    - clang
    - clang-devel
    - git
  environment:
    PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

- name: Initialize Postgres RHEL
  become: true
  command: /usr/pgsql-{{ major_version }}/bin/postgresql-{{ major_version }}-setup initdb
  environment:
    PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

- name: Start Postgres RHEL
  service:
    name: postgresql-{{ major_version }}
    state: started
    enabled: yes

- name: Install percona-pgaudit{{ major_version }}_set_user RHEL
  yum:
    name: percona-pgaudit{{ major_version }}_set_user
    state: latest
    update_cache: yes

# pg_tde (pg_tde/tde/tasks/redhat_depends.yml) hit the exact same problem
# building from source on RHEL9: CFLAGS inherited from `pg_config --cflags`
# include -Wmissing-variable-declarations, which needs gcc 12+ and RHEL9's
# stock gcc is 11.x. Their fix - install gcc-toolset-14 and source its
# enable script before building - is what's applied here too, rather than
# stripping the flag (which they tried first and abandoned, per the
# commented-out sed approach in pg_tde/tde/tasks/main.yml).
- name: Install gcc-toolset-14 for CFLAGS/LTO compatibility on RHEL 9
  dnf:
    name: gcc-toolset-14
    state: present
  when: ansible_distribution_major_version == "9"

- name: Clone set_user sources
  git:
    repo: "{{ repo }}"
    version: "{{ version }}"
    dest: /tmp/set_user
  vars:
    repo: "{{ lookup('env', 'COMPONENT_REPO') }}"
    version: "{{ lookup('env', 'COMPONENT_VERSION') }}"
  become_user: postgres

# Non-fatal: this is a nice-to-have "does it still compile" check, not the
# real test (installcheck against the packaged binary below is). Compiler
# flags inherited from `pg_config --cflags` reflect whatever toolchain built
# the official package (e.g. a newer gcc-toolset than the AMI's stock gcc),
# so an unrelated flag-compatibility failure here shouldn't block the
# pipeline before it even reaches the test that actually matters.
- name: Build set_user from sources (compile-only sanity check, packaged binary installed above is what installcheck runs against)
  shell: |
    {% if ansible_distribution_major_version == "9" %}
    source /opt/rh/gcc-toolset-14/enable
    {% endif %}
    set -o pipefail
    make USE_PGXS=1
  args:
    chdir: "/tmp/set_user"
    executable: /bin/bash
  register: set_user_build
  ignore_errors: true

- debug:
    msg: >-
      set_user compile-only sanity build {{ 'succeeded' if set_user_build is success else
      'FAILED (informational only, does not block installcheck below): ' + (set_user_build.msg | default('')) }}

# Deliberately not running `make install` here: the packaged set_user
# installed above is the artifact we want installcheck to validate, not a
# from-source build that would silently overwrite it.

- name: Add extensions to postgresql.conf for RHEL
  lineinfile:
    path: /var/lib/pgsql/{{ major_version }}/data/postgresql.conf
    line: shared_preload_libraries = 'set_user'

- name: Restart Postgres RHEL
  service:
    name: postgresql-{{ major_version }}
    state: stopped
  register: out

- name: Start Postgres RHEL
  service:
    name: postgresql-{{ major_version }}
    state: started
    enabled: yes

- name: Test set_user
  shell: |
    {% if ansible_distribution_major_version == "9" %}
    source /opt/rh/gcc-toolset-14/enable
    {% endif %}
    set -o pipefail
    make installcheck USE_PGXS=1
  args:
    chdir: "/tmp/set_user"
    executable: /bin/bash
  become_user: postgres
  register: installcheck

- debug: var=installcheck.stdout_lines
