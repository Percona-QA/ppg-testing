---
dependency:
  name: galaxy
driver:
  name: ${driver}
platforms:
  - name: pgstatmon-debian11-arm-${BUILD_NUMBER}
    region: ${region}
    image: ${ami_debian11_arm64}
    vpc_subnet_id: ${vpc_subnet_id_aws2}
    instance_type: t4g.xlarge
    ssh_user: admin
    root_device_name: /dev/xvda
    instance_tags:
      iit-billing-tag: jenkins-pg-worker
provisioner:
  name: ansible
  log: True
  playbooks:
    create: ../../../../playbooks/create.yml
    destroy: ../../../../playbooks/destroy.yml
    prepare: ../../../../playbooks/prepare.yml
    converge: ../../playbooks/playbook.yml
    verify: ../../playbooks/verify.yml
verifier:
  name: testinfra
  directory: ../../../tests/
  options:
    verbose: true
    s: true
    junitxml: report.xml
scenario:
  destroy_sequence:
    - destroy
  cleanup_sequence:
    - cleanup
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - verify
    - destroy
