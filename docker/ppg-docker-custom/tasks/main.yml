---
- name: Set Facts.
  set_fact:
    DOCKER_REPOSITORY: "{{ lookup('env', 'REPOSITORY') }}"
    PPG_VERSION: "{{ lookup('env', 'SERVER_VERSION')}}"
    TAG: "{{ lookup('env', 'DOCKER_TAG')}}"
    cacheable: true

- name: Assign TAG based on architecture and version
  set_fact:
    TAG: >-
      {{
        TAG if ansible_architecture == 'x86_64' and not TAG|regex_search('multi')
        else TAG if ansible_architecture == 'aarch64' and (not TAG|regex_search('multi') and TAG|regex_search('-arm64$'))
        else TAG|string + '-arm64' if ansible_architecture == 'aarch64' and not TAG|regex_search('multi')
        else TAG
      }}
  when: "ansible_architecture == 'x86_64' or ansible_architecture == 'aarch64'"

- name: Print PPG_VERSION and TAG
  debug:
    msg: "PPG_VERSION: {{ PPG_VERSION }}, TAG: {{ TAG }}"

- name: Yum update
  become: true
  command: yum -y update
  when: ansible_os_family == "RedHat"

- name: Ensure required dependencies are installed
  ansible.builtin.yum:
    name:
      - yum-utils
      - device-mapper-persistent-data
      - lvm2
    state: present
  when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"

- name: Install kernel-modules-extra on RHEL 10
  dnf:
    name: "kernel-modules-extra-{{ ansible_kernel }}"
    state: present
  when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"

- name: Ensure br_netfilter module is loaded (RHEL 10 only)
  community.general.modprobe:
    name: br_netfilter
    state: present
  when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"

- name: Add Docker CE repository RHEL 8,9
  become: true
  command: yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  when: ansible_os_family == "RedHat"

- name: Yum update
  become: true
  command: yum -y update
  when: ansible_os_family == "RedHat"

- name: Install python3-psycopg2
  become: true
  apt:
    name: python3-psycopg2
    state: latest
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install python3-psycopg2
  become: true
  ansible.builtin.yum:
    name: python3-psycopg2
    state: latest
  when: ansible_os_family == "RedHat"

- name: Install Docker packages
  become: true
  ansible.builtin.yum:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
  when: ansible_os_family == "RedHat"

- name: Ensure containerd service is started
  include_tasks: ../../../../tasks/start_service_with_diagnostics.yml
  vars:
    svc_name: containerd
    svc_state: started
  when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"

- name: Start docker
  include_tasks: ../../../../tasks/start_service_with_diagnostics.yml
  vars:
    svc_name: docker
    svc_state: started
  when: ansible_os_family == "RedHat"

- name: Install docker.io Deb
  become: true
  apt:
    name: docker.io
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install python3-pip
  become: true
  apt:
    name: python3-pip
    state: latest
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: run this on OSX type systems
  debug: msg="hello from osx"
  when: ansible_distribution == 'MacOSX'

- name: Install brew
  become: true
  command: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install.sh)"
  when: ansible_os_family == "MacOSX"

- name: Install Docker
  become: true
  command: brew cask install docker
  when: ansible_os_family == "MacOSX"

- name: show docker version
  command: docker -v
  register: results
  when: ansible_os_family == "Debian" or ansible_os_family == "MacOSX"

- debug:
    var: results.stdout

- name: show docker binary location
  command: which docker
  register: results

- debug:
    var: results.stdout

- name: Install python3-venv
  become: true
  apt:
    name: python3-venv
    state: latest
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install bash
  become: true
  apt:
    name: bash
    state: latest
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Ensure test directory exists
  file:
    path: /tmp/docker_test
    state: directory
    mode: 0755

- name: Copy PostgreSQL test files to remote
  copy:
    src: "{{ item }}"
    dest: "/tmp/docker_test/{{ item }}"
    owner: root
    group: root
    mode: 0644
  loop:
    - settings.py
    - test_docker.py
    - test_patroni_ha.py
    - test_pgbackrest.py
    - test_labels_licences.py

- name: Ensure Python virtual environment exists
  ansible.builtin.command: python3 -m venv validation
  args:
    chdir: /tmp/docker_test
    creates: /tmp/docker_test/validation

- name: Install bash on Debian
  become: true
  apt:
    name: bash
    state: latest
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Create python venv and run docker tests
  shell: |
    #Activate virtual environment
    source validation/bin/activate

    #Install dependencies
    pip install --upgrade pip
    pip install psycopg2-binary pytest-testinfra requests pytest pytest-order

    #Run test without shared_preload_libraries  (default)
    pytest test_labels_licences.py \
       test_docker.py \
       test_patroni_ha.py \
       test_pgbackrest.py \
       -vv -s -rpfs
  args:
    executable: /bin/bash
    chdir: /tmp/docker_test
  become: true
  environment:
    VERSION: "{{ PPG_VERSION }}"
    DOCKER_REPOSITORY: "{{ DOCKER_REPOSITORY }}"
    TAG: "{{ TAG }}"
    PPG_LABEL_MAINTAINER: "{{ ppg_label_maintainer | default('Percona Development <info@percona.com>') }}"
    PPG_LABEL_VENDOR: "{{ ppg_label_vendor | default('Percona') }}"
    PPG_LABEL_NAME_POSTGRESQL: "{{ ppg_label_name_postgresql | default('Percona Distribution for PostgreSQL') }}"
  ignore_errors: true
  register: results

- name: Show stdout of Docker tests
  debug:
    var: results.stdout_lines

- name: Show stderr if Docker tests fails
  debug:
    var: results.stderr_lines
  when:
    - results is defined
    - results.rc != 0

- name: Dump docker container logs if Docker tests failed
  include_tasks: ../../../../tasks/dump_docker_logs.yml
  when:
    - results is defined
    - results.rc != 0

- name: Fail the playbook if Docker tests failed
  fail:
    msg: "Docker tests failed with return code {{ results.rc }}"
  when:
    - results is defined
    - results.rc != 0
