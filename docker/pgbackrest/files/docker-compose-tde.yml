services:
  pg-primary:
    image: ${PG_IMAGE}
    container_name: ${PG_CONTAINER_NAME:-pg_primary}
    user: root
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      PGDATA: /data/db
      WITH_TDE: "${WITH_TDE:-0}"
      ENABLE_PG_TDE: "${WITH_TDE:-0}"
    volumes:
      - pgdata:/data/db
      - pg_socket:/var/run/postgresql
      - repo_data:/var/lib/pgbackrest
      - ./pgbackrest.conf:/etc/pgbackrest.conf:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    shm_size: "1g"
    command: postgres -c 'wal_level=replica' -c 'max_wal_senders=4' -c 'archive_mode=on' -c 'archive_command=TMPDIR=/tmp ${PG_BIN}/pg_tde_archive_decrypt %f %p "pgbackrest --config=/etc/pgbackrest.conf --stanza=${PGBACKREST_STANZA_NAME:-main} archive-push %%p"'

  pgbackrest:
    image: ${PGBACKREST_IMAGE}
    container_name: ${PGBACKREST_CONTAINER_NAME:-pgbackrest}
    command: ["tail", "-f", "/dev/null"]
    environment:
      - PGBACKREST_STANZA=${PGBACKREST_STANZA_NAME:-main}
    volumes:
      # CRITICAL: Same volume and path as pg-primary
      - pgdata:/data/db
      - repo_data:/var/lib/pgbackrest
      - pg_socket:/var/run/postgresql
      - ./pgbackrest.conf:/etc/pgbackrest.conf:ro
      # Restore target for "new container from backup" test
      - pgdata_restored:/data/restored
    depends_on:
      - pg-primary

  # Restored instance: started only after restore; used to verify full backup (TDE).
  pg-restored:
    profiles:
      - restore
    image: ${PG_IMAGE}
    container_name: ${PG_RESTORED_CONTAINER_NAME:-pg_restored}
    user: root
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      PGDATA: /data/db
      WITH_TDE: "${WITH_TDE:-0}"
      ENABLE_PG_TDE: "${WITH_TDE:-0}"
    volumes:
      - pgdata_restored:/data/db
      - pg_socket_restored:/var/run/postgresql
      - repo_data:/var/lib/pgbackrest
      - ./pgbackrest.conf:/etc/pgbackrest.conf:ro
    ports:
      - "5433:5432"
    shm_size: "1g"
    command: postgres -c 'wal_level=replica' -c 'max_wal_senders=4' -c 'archive_mode=on' -c 'archive_command=TMPDIR=/tmp ${PG_BIN}/pg_tde_archive_decrypt %f %p "pgbackrest --config=/etc/pgbackrest.conf --stanza=${PGBACKREST_STANZA_NAME:-main} archive-push %%p"'

volumes:
  pgdata:
  repo_data:
  pg_socket:
  pgdata_restored:
  pg_socket_restored:
