[databases]
;; Connect to the pg-primary service defined in docker-compose
postgres = host=pg-primary port=5432 dbname=postgres

[pgbouncer]
;; Network Settings
listen_addr = 0.0.0.0
listen_port = {{ pgbouncer_port }}

;; Authentication Settings (md5 to match PostgreSQL auth in compose)
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; Admin Access (needed for SHOW VERSION, PAUSE, RESUME)
admin_users = {{ postgres_user }}, {{ pgbouncer_admin_user }}

;; Resource Limits
max_client_conn = 100
default_pool_size = 20

;; Pooling Mode (session, transaction, or statement)
pool_mode = transaction

;; Logging
log_connections = 1
log_disconnections = 1
verbose = 1