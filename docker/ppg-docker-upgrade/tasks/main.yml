---
- name: Set Facts.
  set_fact:
    DOCKER_REPOSITORY: "{{ lookup('env', 'REPOSITORY') }}"
    OLD_VERSION: "{{ lookup('env', 'OLD_SERVER_VERSION') | default('17.10', true) }}"
    NEW_VERSION: "{{ lookup('env', 'NEW_SERVER_VERSION') | default('18.4', true) }}"
    OLD_TAG: "{{ lookup('env', 'OLD_VERSION_DOCKER_TAG') | default(lookup('env', 'OLD_VERSION'), true) }}"
    NEW_TAG: "{{ lookup('env', 'NEW_VERSION_DOCKER_TAG') | default(lookup('env', 'NEW_VERSION'), true) }}"
    UPGRADE_TAG: "{{ lookup('env', 'UPGRADE_DOCKER_TAG') | default('18-17-16-15-14', true) }}"
    WITH_POSTGIS: "{{ lookup('env', 'WITH_POSTGIS') | default('false', true) }}"
    cacheable: true

- name: Print upgrade pair
  debug:
    msg: "Upgrade: PG {{ OLD_VERSION }} → PG {{ NEW_VERSION }}"

- name: Assign OLD_TAG based on architecture
  set_fact:
    OLD_TAG: >-
      {{
        OLD_TAG if ansible_architecture == 'x86_64' and not OLD_TAG|regex_search('multi')
        else OLD_TAG if ansible_architecture == 'aarch64' and (not OLD_TAG|regex_search('multi') and OLD_TAG|regex_search('-arm64$'))
        else OLD_TAG|string + '-arm64' if ansible_architecture == 'aarch64' and not OLD_TAG|regex_search('multi')
        else OLD_TAG
      }}
  when: "ansible_architecture == 'x86_64' or ansible_architecture == 'aarch64'"

- name: Assign NEW_TAG based on architecture
  set_fact:
    NEW_TAG: >-
      {{
        NEW_TAG if ansible_architecture == 'x86_64' and not NEW_TAG|regex_search('multi')
        else NEW_TAG if ansible_architecture == 'aarch64' and (not NEW_TAG|regex_search('multi') and NEW_TAG|regex_search('-arm64$'))
        else NEW_TAG|string + '-arm64' if ansible_architecture == 'aarch64' and not NEW_TAG|regex_search('multi')
        else NEW_TAG
      }}
  when: "ansible_architecture == 'x86_64' or ansible_architecture == 'aarch64'"

- name: Print resolved tags
  debug:
    msg: "OLD_TAG: {{ OLD_TAG }}, NEW_TAG: {{ NEW_TAG }}, UPGRADE_TAG: {{ UPGRADE_TAG }}"

- name: Yum update
  become: true
  command: yum -y update
  when: ansible_os_family == "RedHat"

- name: Ensure required dependencies are installed
  ansible.builtin.yum:
    name:
      - yum-utils
      - device-mapper-persistent-data
      - lvm2
    state: present
  when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"

- name: Install kernel-modules-extra on RHEL 10
  dnf:
    name: "kernel-modules-extra-{{ ansible_kernel }}"
    state: present
  when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"

- name: Ensure br_netfilter module is loaded (RHEL 10 only)
  community.general.modprobe:
    name: br_netfilter
    state: present
  when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"

- name: Add Docker CE repository RHEL 8,9
  become: true
  command: yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  when: ansible_os_family == "RedHat"

- name: Yum update
  become: true
  command: yum -y update
  when: ansible_os_family == "RedHat"

- name: Install python3-psycopg2
  become: true
  apt:
    name: python3-psycopg2
    state: latest
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install python3-psycopg2
  become: true
  ansible.builtin.yum:
    name: python3-psycopg2
    state: latest
  when: ansible_os_family == "RedHat"

- name: Install Docker packages
  become: true
  ansible.builtin.yum:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
  when: ansible_os_family == "RedHat"

- name: Ensure containerd service is started
  ansible.builtin.service:
    name: containerd
    state: started
    enabled: yes
  when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"

- name: Start docker
  become: true
  service:
    name: docker
    state: started
    enabled: yes
  when: ansible_os_family == "RedHat"

- name: Install docker.io Deb
  become: true
  apt:
    name: docker.io
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install python3-pip
  become: true
  apt:
    name: python3-pip
    state: latest
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: run this on OSX type systems
  debug: msg="hello from osx"
  when: ansible_distribution == 'MacOSX'

- name: Install brew
  become: true
  command: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install.sh)"
  when: ansible_os_family == "MacOSX"

- name: Install Docker
  become: true
  command: brew cask install docker
  when: ansible_os_family == "MacOSX"

- name: show docker version
  command: docker -v
  register: results
  when: ansible_os_family == "Debian" or ansible_os_family == "MacOSX"

- debug:
    var: results.stdout

- name: show docker binary location
  command: which docker
  register: results

- debug:
    var: results.stdout

- name: Install python3-venv
  become: true
  apt:
    name: python3-venv
    state: latest
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install bash
  become: true
  apt:
    name: bash
    state: latest
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Ensure test directory exists
  file:
    path: /tmp/docker_upgrade_test
    state: directory
    mode: 0755

- name: Copy upgrade test files to remote
  copy:
    src: "{{ item.src }}"
    dest: "/tmp/docker_upgrade_test/{{ item.src }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { src: settings.py,              mode: "0644" }
    - { src: test_upgrade.py,          mode: "0644" }
    - { src: test_docker.py,           mode: "0644" }
    - { src: test_labels_licences.py,  mode: "0644" }
    - { src: test_patroni_ha.py,       mode: "0644" }
    - { src: test_pgbackrest.py,       mode: "0644" }
    - { src: run.sh,                   mode: "0755" }

- name: Ensure Python virtual environment exists
  ansible.builtin.command: python3 -m venv validation
  args:
    chdir: /tmp/docker_upgrade_test
    creates: /tmp/docker_upgrade_test/validation

- name: Install bash on Debian
  become: true
  apt:
    name: bash
    state: latest
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Run full 3-phase upgrade test suite via run.sh
  shell: ./run.sh
  args:
    executable: /bin/bash
    chdir: /tmp/docker_upgrade_test
  become: true
  environment:
    OLD_VERSION: "{{ OLD_VERSION }}"
    NEW_VERSION: "{{ NEW_VERSION }}"
    DOCKER_REPOSITORY: "{{ DOCKER_REPOSITORY }}"
    OLD_TAG: "{{ OLD_TAG }}"
    NEW_TAG: "{{ NEW_TAG }}"
    UPGRADE_TAG: "{{ UPGRADE_TAG }}"
    WITH_POSTGIS: "{{ WITH_POSTGIS }}"
    PPG_LABEL_MAINTAINER: "{{ ppg_label_maintainer | default('Percona Development <info@percona.com>') }}"
    PPG_LABEL_VENDOR: "{{ ppg_label_vendor | default('Percona') }}"
    PPG_LABEL_NAME_POSTGRESQL: "{{ ppg_label_name_postgresql | default('Percona Distribution for PostgreSQL') }}"
  ignore_errors: true
  register: results

- name: Show stdout of upgrade tests
  debug:
    var: results.stdout_lines

- name: Show stderr if upgrade tests fail
  debug:
    var: results.stderr_lines
  when:
    - results is defined
    - results.rc != 0

- name: Fail the playbook if upgrade tests failed
  fail:
    msg: "Upgrade tests failed with return code {{ results.rc }}"
  when:
    - results is defined
    - results.rc != 0
