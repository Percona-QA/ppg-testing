  #       debug:
  #         var: pgsql_dir_listing.stdout_lines

  #     - name: Copy postgresql/t files to pg_tde/t
  #       shell: cp -r /tmp/percona-qa/postgresql/t/* /tmp/pg_tde/t/

  #   when: testsuite == 'check-tde'

  # -------------------------------------------------------------------------
  # Phase 1 (root): confirms binary + TLS work fine — already shown ~1s startup.
  # Phase 2 (postgres): mirrors exactly what CosmianKms.pm/_spawn() does:
  #   IPC::Run starts cosmian_kms as the postgres user with stdout→/dev/null.
  #   Any crash output is silently swallowed, leaving $stderr empty, so we only
  #   see "readiness timed out" with no clue why. This diagnostic captures stdout
  #   so we can see the actual error when run as postgres.
  # -------------------------------------------------------------------------
  - name: Diagnose cosmian_kms TLS startup timing on RHEL 9/10
    become: true
    ansible.builtin.shell: |
      set -eo pipefail
      echo "=== ldd of cosmian_kms ==="
      ldd /usr/sbin/cosmian_kms 2>&1 || echo "ldd failed"
      echo "=== SELinux status ==="
      getenforce 2>/dev/null || echo "not available"
      echo "=== cosmian_kms permissions ==="
      ls -la /usr/sbin/cosmian_kms
      echo "=== /usr/local/cosmian/lib permissions ==="
      ls -la /usr/local/cosmian/lib/ 2>/dev/null || echo "not found"
      ls -la /usr/local/cosmian/lib/ossl-modules/ 2>/dev/null || echo "ossl-modules not found"

      # ---- shared cert+toml generation function ----
      gen_kms_env() {
        local TLSDIR=$1
        openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
          -keyout $TLSDIR/ca.key -out $TLSDIR/ca.pem \
          -subj '/CN=pg_tde-test-ca' 2>&1
        openssl req -newkey rsa:2048 -nodes \
          -keyout $TLSDIR/server.key -out $TLSDIR/server.csr \
          -subj '/CN=127.0.0.1' -addext 'subjectAltName=IP:127.0.0.1' 2>&1
        openssl x509 -req -in $TLSDIR/server.csr \
          -CA $TLSDIR/ca.pem -CAkey $TLSDIR/ca.key -CAcreateserial \
          -days 1 -out $TLSDIR/server.pem -copy_extensions copy 2>&1
        openssl pkcs12 -export -out $TLSDIR/server.p12 \
          -inkey $TLSDIR/server.key -in $TLSDIR/server.pem \
          -password pass:test 2>&1
        cat > $TLSDIR/kms.toml << TOML
      default_username = "admin"

      [db]
      database_type = "sqlite"
      sqlite_path   = "$TLSDIR/db"
      clear_database = true

      [tls]
      tls_p12_file         = "$TLSDIR/server.p12"
      tls_p12_password     = "test"
      clients_ca_cert_file = "$TLSDIR/ca.pem"

      [socket_server]
      socket_server_start    = true
      socket_server_port     = 17801
      socket_server_hostname = "127.0.0.1"

      [http]
      port     = 17802
      hostname = "127.0.0.1"

      [logging]
      rust_log = "info,cosmian_kms=info"
      TOML
      }

      # ---- Phase 1: run as root (already confirmed ~1s) ----
      echo "=== Phase 1: cosmian_kms as ROOT ==="
      TLSDIR=$(mktemp -d /tmp/kms-root-XXXXXX)
      gen_kms_env $TLSDIR
      /usr/sbin/cosmian_kms -c $TLSDIR/kms.toml > $TLSDIR/kms.stdout 2>$TLSDIR/kms.stderr &
      KMS_PID=$!
      START_MS=$(date +%s%3N)
      READY=0
      for i in $(seq 1 30); do
        sleep 1
        if curl -fsSk -m 2 https://127.0.0.1:17802/version > /dev/null 2>&1; then
          NOW_MS=$(date +%s%3N)
          echo "ROOT: HTTPS READY after $((NOW_MS - START_MS))ms (attempt $i)"
          READY=1; break
        fi
      done
      [ "$READY" = "0" ] && echo "ROOT: HTTPS NOT READY after 30s"
      kill $KMS_PID 2>/dev/null || true
      rm -rf $TLSDIR

      # ---- Phase 2: run as postgres (mirrors CosmianKms.pm _spawn exactly) ----
      echo "=== Phase 2: cosmian_kms as POSTGRES USER ==="
      TLSDIR=$(mktemp -d /tmp/kms-postgres-XXXXXX)
      chmod 755 $TLSDIR
      gen_kms_env $TLSDIR
      chmod 644 $TLSDIR/*.pem $TLSDIR/*.p12 $TLSDIR/*.toml $TLSDIR/*.key 2>/dev/null || true
      # Detect OPENSSL_MODULES exactly as CosmianKms.pm does
      OSSL_MODULES=""
      for d in /usr/local/cosmian/lib/ossl-modules /usr/lib64/ossl-modules \
                /usr/lib/x86_64-linux-gnu/ossl-modules /usr/lib/aarch64-linux-gnu/ossl-modules; do
        [ -d "$d" ] && OSSL_MODULES="$d" && break
      done
      echo "OPENSSL_MODULES will be: ${OSSL_MODULES:-<not set>}"
      # Run as postgres — stdout captured (IPC::Run sends this to /dev/null, hiding crashes)
      su -s /bin/bash postgres -c "
        OPENSSL_MODULES='$OSSL_MODULES' \
        /usr/sbin/cosmian_kms -c $TLSDIR/kms.toml \
          > $TLSDIR/kms.stdout 2>$TLSDIR/kms.stderr &
        KMS_PID=\$!
        START_MS=\$(date +%s%3N)
        READY=0
        for i in \$(seq 1 30); do
          sleep 1
          if curl -fsSk -m 2 https://127.0.0.1:17802/version > /dev/null 2>&1; then
            NOW_MS=\$(date +%s%3N)
            echo \"POSTGRES: HTTPS READY after \$((NOW_MS - START_MS))ms (attempt \$i)\"
            READY=1; break
          fi
          echo \"  attempt \$i: not ready\"
        done
        [ \"\$READY\" = \"0\" ] && echo 'POSTGRES: HTTPS NOT READY after 30s'
        kill \$KMS_PID 2>/dev/null || true
      " 2>&1
      echo "--- cosmian_kms stdout as postgres (what IPC::Run hides) ---"
      cat $TLSDIR/kms.stdout 2>/dev/null || echo "(empty)"
      echo "--- cosmian_kms stderr as postgres ---"
      cat $TLSDIR/kms.stderr 2>/dev/null || echo "(empty)"
      echo "--- AVC denials ---"
      ausearch -m AVC -ts recent 2>/dev/null | tail -20 || echo "none / ausearch unavailable"
      rm -rf $TLSDIR
    args:
      executable: /bin/bash
    register: cosmian_diag
    ignore_errors: true
    when:
      - testsuite in ['installcheck-world', 'check-tde']
      - ansible_os_family == 'RedHat'
      - ansible_distribution_major_version in ['9', '10']

  - name: Show cosmian_kms diagnostic output
    debug:
      var: cosmian_diag.stdout_lines
    when:
      - testsuite in ['installcheck-world', 'check-tde']
      - ansible_os_family == 'RedHat'
      - ansible_distribution_major_version in ['9', '10']

  - name: Save cosmian_kms diagnostic to file for artifact collection
    ansible.builtin.copy:
      content: "{{ cosmian_diag.stdout | default('') }}\nSTDERR:\n{{ cosmian_diag.stderr | default('') }}"
      dest: /tmp/cosmian-kms-diag.log
    become: true
    ignore_errors: true
    when:
      - testsuite in ['installcheck-world', 'check-tde']
      - ansible_os_family == 'RedHat'
      - ansible_distribution_major_version in ['9', '10']

  # =============================
  # Run pg_tde regression tests
  # =============================
  - name: Run check tde tests
    shell: |
      export PGCTLTIMEOUT=120
      export PG_TEST_TIMEOUT_DEFAULT=300
      set -o pipefail
      meson test --no-rebuild --timeout-multiplier=1000 --print-errorlogs -C /tmp/pg_tde-build 2>&1 | tee /tmp/check-tde-regression.log
      # cd /tmp/pg_tde && make -s installcheck -k PROVE_FLAGS='-v -p' 2>&1 | tee /tmp/check-tde-regression.log
      # cd /tmp/pg_tde && make -s installcheck -k
    become_user: postgres
    args:
      executable: /bin/bash
      chdir: "/tmp/pg_tde"
    environment:
      PATH: "/opt/pgsql/bin:/opt/pgsql/lib:{{ ansible_env.PATH }}"
      LD_LIBRARY_PATH: "/opt/pgsql/lib"
      PG_TEST_PORT_DIR: "/tmp/pg_tde_port"
      INSTALL_DIR: "/opt/pgsql"
      PERCONA_SERVER_VERSION: "{{ percona_server_version }}"
      PGCTLTIMEOUT: "120"
      PG_TEST_TIMEOUT_DEFAULT: "300"
      LANG: "C.UTF-8"
      LC_CTYPE: "C.UTF-8"
      LC_ALL: "C.UTF-8"
    when: testsuite == 'check-tde'
    ignore_errors: true
    register: regression

  - name: Show stdout of check tde tests
    debug:
      var: regression.stdout_lines
    when: testsuite == 'check-tde'

  - name: Show stderr if test fails
    debug:
      var: regression.stderr_lines
    when:
      - testsuite == 'check-tde'
      - regression is defined
      - regression.rc != 0

  - name: Show tde regression diffs if tests failed
    shell: |
      # meson writes regression.diffs to the build dir
      cat /tmp/pg_tde-build/regression.diffs 2>/dev/null || \
      cat /tmp/pg_tde/regression.diffs 2>/dev/null || true
    register: diffs_output
    when:
      - testsuite == 'check-tde'
      - regression is defined
      - regression.rc != 0
    ignore_errors: true

  - name: Print tde regression diffs
    debug:
      msg: "{{ diffs_output.stdout_lines }}"
    when:
      - testsuite == 'check-tde'
      - regression is defined
      - regression.rc != 0
      - diffs_output is defined

  - name: Debug - find regression files and results dirs before packaging (check-tde)
    shell: |
      echo "=== regression.out files ==="
      find /tmp/pg_tde-build /tmp/pg_tde -name "regression.out" 2>/dev/null || true
      echo "=== regression.diffs files ==="
      find /tmp/pg_tde-build /tmp/pg_tde -name "regression.diffs" 2>/dev/null || true
      echo "=== results/ directories (outside tmp_check) ==="
      find /tmp/pg_tde -type d -name "results" -not -path "*/tmp_check/*" 2>/dev/null || true
    args:
      executable: /bin/bash
    register: debug_regression
    ignore_errors: true
    become: true
    when:
      - testsuite == 'check-tde'
      - regression is defined

  - debug:
      var: debug_regression.stdout_lines
    when:
      - testsuite == 'check-tde'
      - regression is defined

  - name: Package check-tde test artifacts
    shell: |
      set -uo pipefail
      ARTIFACT_BASENAME="{{ artifact_filename | replace('.tar.gz', '') }}"
      ARTIFACT_DIR="/tmp/$ARTIFACT_BASENAME"
      rm -rf "$ARTIFACT_DIR"
      mkdir -p "$ARTIFACT_DIR"
      # SQL regression diffs/results — meson writes these to the build dir
      cp /tmp/pg_tde-build/regression.diffs "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/pg_tde-build/regression.out   "$ARTIFACT_DIR/" 2>/dev/null || true
      find /tmp/pg_tde -name "regression.diffs" -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
      find /tmp/pg_tde -name "regression.out" -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
      # Full meson test log with complete stderr per test
      cp -r /tmp/pg_tde-build/meson-logs "$ARTIFACT_DIR/meson-logs" 2>/dev/null || true
      # Per-test log directories from testwrap
      find /tmp/pg_tde-build/testrun -name "*.log" -type f 2>/dev/null | \
        xargs -I{} cp --parents {} "$ARTIFACT_DIR/" || true
      cp -r /tmp/pg_tde/t "$ARTIFACT_DIR/pg_tde_t" 2>/dev/null || true
      # tmp_check is in the build dir with meson (source dir path is dead code)
      cp -r /tmp/pg_tde-build/tmp_check "$ARTIFACT_DIR/tmp_check" 2>/dev/null || true
      # Collect standalone results/ directories for pg_regress SQL test outputs
      find /tmp/pg_tde -type d -name "results" -not -path "*/tmp_check/*" | while read d; do
        rel="${d#/tmp/pg_tde/}"
        mkdir -p "$ARTIFACT_DIR/pg_tde/$rel"
        cp -r "$d/." "$ARTIFACT_DIR/pg_tde/$rel/" 2>/dev/null || true
      done
      cp /tmp/postgres/logfile "$ARTIFACT_DIR/server.log" 2>/dev/null || true
      cp /tmp/postgres/build.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/tde-build.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/tde-install.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/kmip-build.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/check-tde-regression.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/bao-server.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/cosmian-kms-diag.log "$ARTIFACT_DIR/" 2>/dev/null || true
      tar -czf "/tmp/{{ artifact_filename }}" -C /tmp "$ARTIFACT_BASENAME"
    args:
      executable: /bin/bash
    become: true
    when:
      - testsuite == 'check-tde'
      - regression is defined
    ignore_errors: true

  - name: Fetch check-tde test artifacts to controller
    fetch:
      src: "/tmp/{{ artifact_filename }}"
      dest: "{{ playbook_dir }}/../artifacts/"
      fail_on_missing: false
    when:
      - testsuite == 'check-tde'
      - regression is defined

  - name: Fail the playbook if tde tests failed
    fail:
      msg: "TDE regression tests failed with return code {{ regression.rc }}"
    when:
      - testsuite == 'check-tde'
      - regression is defined
      - regression.rc != 0

