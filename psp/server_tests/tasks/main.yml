  - name: initdb cluster
    become_user: postgres
    command: >
      ./initdb -D /opt/pgsql/data
      {{ '--locale=C.UTF-8' if ansible_distribution == 'Debian' else '' }}
    args:
      chdir: /opt/pgsql/bin
      executable: /bin/bash
    environment:
      PATH: "/opt/pgsql/bin:/opt/pgsql/lib:{{ ansible_env.PATH }}"
      LD_LIBRARY_PATH: "/opt/pgsql/lib"
    when:
      - testsuite in ['installcheck-world', 'check-tde']
    register: results

  - debug: var=results.stdout_lines

  - name: Build pg_tde
    become: true
    become_user: postgres
    ansible.builtin.shell: |
      set -o pipefail
      rm -rf /tmp/pg_tde-build
      meson setup --buildtype=release -Dpg_config=/opt/pgsql/bin/pg_config -Dwerror=true /tmp/pg_tde-build 2>&1 | tee /tmp/tde-build.log
      # make PG_CONFIG=/opt/pgsql/bin/pg_config install 2>&1 | tee /tmp/tde-build.log
    args:
      chdir: /tmp/pg_tde
      executable: /bin/bash
    environment:
      PATH: "/opt/pgsql/bin:/opt/pgsql/lib:{{ ansible_env.PATH }}"
      TDE_MODE: "1"
    when:
      - testsuite in ['installcheck-world', 'check-tde']
    register: results

  - debug: var=results.stdout_lines

  - name: Install pg_tde
    become: true
    ansible.builtin.shell: |
      set -o pipefail
      meson install -C /tmp/pg_tde-build 2>&1 | tee /tmp/tde-install.log
    args:
      executable: /bin/bash
    environment:
      PATH: "/opt/pgsql/bin:/opt/pgsql/lib:{{ ansible_env.PATH }}"
    when:
      - testsuite in ['installcheck-world', 'check-tde']
    register: results

  - debug: var=results.stdout_lines

  - name: Add pg_tde to postgresql.conf
    lineinfile:
      path: /opt/pgsql/data/postgresql.conf
      line: shared_preload_libraries = 'pg_tde'
    when:
      - testsuite in ['installcheck-world', 'check-tde']

  - name: Comment out any line containing 'io_method'
    ansible.builtin.replace:
      path: /opt/pgsql/data/postgresql.conf
      regexp: '^(?!#)(.*io_method.*)$'
      replace: '# \1'
    when:
      - (major_version | int) >= 18
      - testsuite in ['installcheck-world', 'check-tde']

  - name: Update io_method in postgresql.conf for pg-18
    ansible.builtin.lineinfile:
      path: /opt/pgsql/data/postgresql.conf
      line: "io_method = {{ io_method }}"
    when:
      - (major_version | int) >= 18
      - testsuite in ['installcheck-world', 'check-tde']

  # - name: Start Server
  #   become: true
  #   become_user: postgres
  #   shell: |
  #     ulimit -a
  #     ./pg_ctl -D /opt/pgsql/data -l /tmp/postgres/logfile start -o '-p 5432'
