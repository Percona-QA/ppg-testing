      find /tmp/pg_tde -name "regression.diffs" -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
      find /tmp/pg_tde -name "regression.out" -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
      # Collect tmp_check directories for tap test logs
      find /tmp/postgres -type d -name "tmp_check" | while read d; do
        rel="${d#/tmp/postgres/}"
        mkdir -p "$ARTIFACT_DIR/postgres/$rel"
        cp -r "$d/." "$ARTIFACT_DIR/postgres/$rel/" 2>/dev/null || true
      done
      find /tmp/pg_tde -type d -name "tmp_check" | while read d; do
        rel="${d#/tmp/pg_tde/}"
        mkdir -p "$ARTIFACT_DIR/pg_tde/$rel"
        cp -r "$d/." "$ARTIFACT_DIR/pg_tde/$rel/" 2>/dev/null || true
      done
