      cp /tmp/postgres/build.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/tde-build.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/kmip-build.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/installcheck-world-regression.log "$ARTIFACT_DIR/" 2>/dev/null || true
      tar -czf "/tmp/{{ artifact_filename }}" -C /tmp "$ARTIFACT_BASENAME"
    args:
      executable: /bin/bash
    become: true
    when:
      - testsuite == 'installcheck-world'
      - regression is defined
    ignore_errors: true

  - name: Fetch installcheck-world test artifacts to controller
    fetch:
      src: "/tmp/{{ artifact_filename }}"
      dest: "{{ playbook_dir }}/../artifacts/"
      fail_on_missing: false
    when:
      - testsuite == 'installcheck-world'
      - regression is defined

  - name: Fail the playbook if tests failed in installcheck-world
    fail:
      msg: "All regression tests failed with return code {{ regression.rc }}"
    when:
      - testsuite == 'installcheck-world'
      - regression is defined
      - regression.rc != 0
