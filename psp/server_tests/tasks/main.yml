  - name: Package check-server test artifacts
    shell: |
      set -uo pipefail
      ARTIFACT_BASENAME="{{ artifact_filename | replace('.tar.gz', '') }}"
      ARTIFACT_DIR="/tmp/$ARTIFACT_BASENAME"
      rm -rf "$ARTIFACT_DIR"
      mkdir -p "$ARTIFACT_DIR"
      find /tmp/postgres -name "regression.diffs" -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
      find /tmp/postgres -name "regression.out" -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
      # Collect tmp_check directories for tap test logs (make check-world creates these per module)
      find /tmp/postgres -type d -name "tmp_check" | while read d; do
        rel="${d#/tmp/postgres/}"
        mkdir -p "$ARTIFACT_DIR/postgres/$rel"
        cp -r "$d/." "$ARTIFACT_DIR/postgres/$rel/" 2>/dev/null || true
      done
      # Collect standalone results/ directories for pg_regress SQL test outputs
      find /tmp/postgres -type d -name "results" -not -path "*/tmp_check/*" | while read d; do
        rel="${d#/tmp/postgres/}"
        mkdir -p "$ARTIFACT_DIR/postgres/$rel"
        cp -r "$d/." "$ARTIFACT_DIR/postgres/$rel/" 2>/dev/null || true
      done
      # Note: no /tmp/postgres/logfile for check-server — make check-world manages its own
      # temp instances; their per-node server logs are inside the tmp_check/log/ dirs above.
      cp /tmp/postgres/build.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/check-server-regression.log "$ARTIFACT_DIR/" 2>/dev/null || true
      tar -czf "/tmp/{{ artifact_filename }}" -C /tmp "$ARTIFACT_BASENAME"
    args:
      executable: /bin/bash
    become: true
    when:
      - testsuite == 'check-server'
      - regression is defined
    ignore_errors: true

  - name: Fetch check-server test artifacts to controller
    fetch:
      src: "/tmp/{{ artifact_filename }}"
      dest: "{{ playbook_dir }}/../artifacts/"
      fail_on_missing: false
    when:
