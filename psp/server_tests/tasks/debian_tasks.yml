---
  - name: Install Debian Packages
    apt:
      name: "{{ packages }}"
      update_cache: yes
      state: latest
    vars:
      packages:
        - wget
        - libtext-trim-perl
        - libreadline6-dev
        - systemtap-sdt-dev
        - zlib1g-dev
        - libssl-dev
        - libpam0g-dev
        - python3-dev
        - bison
        - flex
        - libipc-run-perl
        - docbook-xsl
        - docbook-xsl
        - libxml2-utils
        - libxml2-dev
        - libxslt-dev
        - xsltproc
        - libkrb5-dev
        - libldap2-dev
        - libsystemd-dev
        - gettext
        - tcl-dev
        - libperl-dev
        - pkg-config
        - clang
        - llvm
        - llvm-dev
        - libselinux1-dev
        - uuid-dev
        - liblz4-dev
        - libcurl4-openssl-dev
        - vim
        - git
        - make
        - gcc
        - autoconf
        - meson
        - ninja-build
        - cmake
        - python3-pip
        - libjson-c-dev
        - libhttp-server-simple-perl
        - python3-pykmip
        - libjson-perl
        - libjson-xs-perl
        - libicu-dev
        - libzstd-dev
        - jq
        - liburing-dev

  - name: Upgrade meson via pip3 on Debian 11 (system meson 0.56 rejects c++20 string from libkmip)
    become: true
    pip:
      name: meson
      state: latest
      executable: pip3
    when: ansible_distribution == "Debian" and ansible_distribution_major_version == "11"

  - name: Install OpenBao
    become: true
    ansible.builtin.shell: |
      OPENBAO_VERSION=2.5.4
      # OpenBao tar.gz uses x86_64/arm64 naming (not amd64/arm64 like dpkg convention)
      ARCH=$(dpkg --print-architecture | sed 's/amd64/x86_64/')
      wget -q https://github.com/openbao/openbao/releases/download/v${OPENBAO_VERSION}/bao_${OPENBAO_VERSION}_Linux_${ARCH}.tar.gz -O /tmp/openbao.tar.gz
      tar -xzf /tmp/openbao.tar.gz -C /usr/local/bin bao
      chmod 0755 /usr/local/bin/bao
      rm -f /tmp/openbao.tar.gz
    args:
      executable: /bin/bash
    when: ansible_os_family == 'Debian'

  - name: Install Cosmian KMS
    become: true
    ansible.builtin.shell: |
      COSMIAN_VERSION=5.21.0
      ARCH=$(dpkg --print-architecture)
      wget -q https://package.cosmian.com/kms/${COSMIAN_VERSION}/deb/${ARCH}/non-fips/static/cosmian-kms-server-non-fips-static-openssl_${COSMIAN_VERSION}_${ARCH}.deb -O /tmp/cosmian_kms.deb
      dpkg -i /tmp/cosmian_kms.deb
      chmod 0755 /usr/sbin/cosmian_kms
      chmod 0755 /usr/local/cosmian/lib/ossl-modules/legacy.so || true
      rm -f /tmp/cosmian_kms.deb
    args:
      executable: /bin/bash
    when: ansible_os_family == 'Debian'

  - name: Ensure correct lz4 package is installed (Debian/Ubuntu)
    ansible.builtin.apt:
      name: "{{ lz4_package }}"
      state: present
      update_cache: yes
    vars:
      lz4_package: >-
        {% if ansible_distribution == 'Debian' and (ansible_distribution_major_version | int) < 13 %}
          liblz4-tool
        {% elif ansible_distribution == 'Ubuntu' and (ansible_distribution_major_version | int) <= 24 %}
          liblz4-tool
        {% else %}
          lz4
        {% endif %}
    when: ansible_os_family == "Debian"

  - name: Ensure locales package is installed on Debian
    become: true
    apt:
      name: locales
      state: present
    when: ansible_distribution == "Debian"

  - name: Generate en_US.UTF-8 locale on Debian
    become: true
    community.general.locale_gen:
      name: en_US.UTF-8
      state: present
    when: ansible_distribution == "Debian"

  - name: Install rename
    ansible.builtin.shell: sudo DEBIAN_FRONTEND=noninteractive apt install -y rename
  
  - name: Install IPC::RUN
    ansible.builtin.shell: yes | sudo /usr/bin/perl -MCPAN -e 'install IPC::RUN'

  - name: Install Text::Trim
    ansible.builtin.shell: yes | sudo /usr/bin/perl -MCPAN -e 'install Text::Trim'

  - name: Add the user 'postgres'
    ansible.builtin.user:
      name: postgres
      shell: /bin/bash
      uid: 1040
      group: admin

  - name: Creates directory
    ansible.builtin.file:
      path: /opt/pgsql
      state: directory
      owner: postgres
      group: admin
      mode: 0775

  - name: Creates directory
    ansible.builtin.file:
      path: /opt/pgsql/data
      state: directory
      owner: postgres
      group: admin
      mode: 0775

  # run_kmip_vault_server.yml is no longer needed — kmip.pl starts its own
