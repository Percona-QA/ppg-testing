---
- name: Set Facts
  set_fact:
    major_version: "{{ lookup('env', 'VERSION').split('.')[0].split('-')[1] }}"
    cacheable: true

- name: Configure repository
  include_tasks: ../../../../tasks/enable_repo.yml

- name: install additional packages for running tests with apt
  apt:
    name: "{{ packages }}"
    update_cache: yes
    state: latest
  vars:
    packages:
      - make
      - gcc
      - pkg-config
      - apt-transport-https
      - ca-certificates
      - curl
      - lsb-release
      - libxml-checker-perl
      - libyaml-perl
      - texlive-latex-base
      - texlive-latex-extra
      - texlive-fonts-recommended
      - lcov
      - rsync
      - zlib1g-dev
      - libssl-dev
      - libxml2-dev
      - libpq-dev
      - valgrind
      - liblz4-dev
      - liblz4-tool
      - zstd
      - libzstd-dev
      - bzip2
      - libbz2-dev
      - libyaml-dev
      - meson
      - libz-dev
      - libyaml-dev
      - libssh2-1-dev
      - psmisc
  retries: 60
  delay: 10
  register: result
  until: result is not failed

- name: install Percona Platform for PostgreSQL deb packages
  apt:
    name: "{{ packages }}"
    update_cache: yes
    state: latest
  vars:
    packages:
    - percona-postgresql
    - percona-postgresql-{{ major_version }}
    - percona-postgresql-all
    - percona-postgresql-client
    - percona-postgresql-client-{{ major_version }}
    - percona-postgresql-client-common
    - percona-postgresql-common
    - percona-postgresql-contrib
    - percona-postgresql-plperl-{{ major_version }}
    - percona-postgresql-plpython3-{{ major_version }}
    - percona-postgresql-pltcl-{{ major_version }}
    - percona-postgresql-server-dev-{{ major_version }}
    - percona-postgresql-server-dev-all
  environment:
    PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

- name: Clone pgbackrest sources
  become_user: postgres
  git:
    repo: "{{ repo }}"
    version: "{{ version }}"
    dest: /tmp/pgbackrest
  vars:
    repo: "{{ lookup('env', 'COMPONENT_REPO') }}"
    version: "{{ lookup('env', 'COMPONENT_VERSION') }}"

- name: Add user postgres to sudoers
  user:
    name: postgres
    groups: sudo
    append: yes

- name: Stop Postgres
  service:
    name: postgresql
    state: stopped
- name: Ensure Apache is stopped and port 80 is free
  ansible.builtin.service:
    name: apache2
    state: stopped
  become: true
  ignore_errors: true

- name: Set postgres user home directory to /home/postgres
  become: true
  ansible.builtin.user:
    name: postgres
    home: /home/postgres
    move_home: yes

- name: Ensure /home/postgres exists
  become: true
  ansible.builtin.file:
    path: /home/postgres
    state: directory
    owner: postgres
    group: postgres
    mode: "0755"

# move_home above relocates /var/lib/postgresql (postgres's original home,
# which is also the parent of every cluster's data directory, create a symlink
# to the moved home directory.
- name: Symlink /var/lib/postgresql back to the moved home directory
  become: true
  ansible.builtin.file:
    src: /home/postgres
    dest: /var/lib/postgresql
    state: link

- name: Find process holding port 80
  ansible.builtin.shell: |
    # Find the PID using netstat or ss
    ss -lntp 'sport = :80' | grep -oP 'pid=\K\d+' || echo '0'
  become: true
  register: port_pid
  changed_when: port_pid.stdout != '0' # Only report changes if a PID was found

- name: Kill process if PID was found
  ansible.builtin.command: kill {{ port_pid.stdout }}
  become: true
  when: port_pid.stdout != '0'
  ignore_errors: true

- name: Make sure tcp port 80 is free
  ansible.builtin.shell:
    cmd: fuser -k 80/tcp
    warn: false
  become: true
  ignore_errors: true
  register: output

  # Explicitly listing every test/define.yaml module except `performance`
  # (benchmarks, not correctness), `test` (tests test.pl's own test-runner
  # infrastructure - test/command/test/{build,define,lint,test,coverage} -
  # not pgbackrest's own behavior), and `doc` (tests pgbackrest's man-page/
  # reference-doc generation tooling - doc/command/build/* - unrelated to
  # backup/restore correctness and not something we ship or use).
- name: Run pgbackrest regression
  become_user: postgres
  command: pgbackrest/test/test.pl --psql-bin=/usr/lib/postgresql/{{ major_version }}/bin \
    --no-valgrind --log-level-test-file=off --no-coverage-report \
    --module=common --module=protocol --module=config --module=storage \
    --module=postgres --module=build --module=info \
    --module=db --module=command --module=integration \
    --vm-out --vm=none --no-coverage --test-path /tmp
  args:
    chdir: "/tmp"
  ignore_errors: true
  register: regression

- name: Show stdout of regression tests
  debug:
    var: regression.stdout_lines

- name: Show stderr if regression test fails
  debug:
    var: regression.stderr_lines
  when:
    - regression is defined
    - regression.rc != 0

- name: Fail the playbook if regression failed
  fail:
    msg: "All regression tests failed with return code {{ regression.rc }}"
  when:
    - regression is defined
    - regression.rc != 0

# The regression suite above builds pgbackrest from source and only ever
# exercises that from-source build - percona-pgbackrest, the package
# customers actually install, was never installed or run at all. This
# functional smoke test installs the real package and puts it to work
# (stanza-create + a real full backup against the live cluster + info),
# verified end-to-end in a local Docker container before adding it here.
- name: Install real percona-pgbackrest package
  apt:
    name: percona-pgbackrest
    state: latest
    update_cache: yes
  environment:
    PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

- name: Start Postgres for the packaged pgbackrest functional test
  service:
    name: postgresql
    state: started

- name: Create pgbackrest repo directory
  file:
    path: /var/lib/pgbackrest
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"

- name: Create /etc/pgbackrest directory
  file:
    path: /etc/pgbackrest
    state: directory

- name: Write pgbackrest.conf for the packaged-binary functional test
  copy:
    dest: /etc/pgbackrest/pgbackrest.conf
    owner: postgres
    group: postgres
    content: |
      [global]
      repo1-path=/var/lib/pgbackrest
      repo1-retention-full=2

      [test]
      pg1-path=/var/lib/postgresql/{{ major_version }}/main
      pg1-port=5432

- name: Enable archive_mode for the packaged pgbackrest functional test
  lineinfile:
    path: /etc/postgresql/{{ major_version }}/main/postgresql.conf
    line: archive_mode = on

- name: Set archive_command to the packaged pgbackrest binary
  lineinfile:
    path: /etc/postgresql/{{ major_version }}/main/postgresql.conf
    line: "archive_command = 'pgbackrest --stanza=test archive-push %p'"

- name: Restart Postgres to pick up archive_mode
  service:
    name: postgresql
    state: restarted

# stanza-create / backup / incremental backup / restore and all their
# assertions live in pgbackrest/tests/test_pgbackrest.py (testinfra verify
# step) instead of here - matching the postgis/pgpool pattern of keeping
# setup/tasks/main.yml to install+configure only, with all functional
# actions and assertions in one place in pytest.
