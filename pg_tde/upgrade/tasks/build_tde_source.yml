---
# Build and install pg_tde from source against a specific PostgreSQL installation.
# Caller must pass:
#   tde_branch_to_build  - git branch/tag to check out
#   tde_src_dest         - where to clone pg_tde (e.g. /tmp/pg_tde_from)
#   tde_build_dest       - meson build directory (e.g. /tmp/pg_tde_from-build)
#   pg_config_path       - full path to pg_config binary
#   pg_bin_dir           - PostgreSQL bin directory (for PATH)
#   pg_lib_dir           - PostgreSQL lib directory (for LD_LIBRARY_PATH)
#   tde_build_log        - path to capture build output
#   tde_install_log      - path to capture install output
# tde_repo is expected to be set as a play-level fact by main.yml.

  - name: Remove existing pg_tde source directory {{ tde_src_dest }}
    file:
      path: "{{ tde_src_dest }}"
      state: absent
    become: true

  - name: Clone pg_tde (branch {{ tde_branch_to_build }}) to {{ tde_src_dest }}
    git:
      repo: "{{ tde_repo }}"
      version: "{{ tde_branch_to_build }}"
      dest: "{{ tde_src_dest }}"
      force: true
    become: true
    become_user: postgres
    register: tde_clone_result

  - name: Initialize pg_tde submodules
    command: git submodule update --init --recursive
    args:
      chdir: "{{ tde_src_dest }}"
      executable: /bin/bash
    become: true
    become_user: postgres

  # Build-system selection by pg_tde version:
  #   - main branch, or version > 2.2.0  -> meson (newer trees are meson-only)
  #   - version <= 2.2.0 (incl. 2.2.0)   -> PGXS make (older trees ship Makefile)
  # The version is parsed from the branch/tag name (e.g. "2.1.2", "release-2.3").
  # A non-version ref such as "main" has no parseable version and uses meson.
  - name: Extract pg_tde version from branch/tag {{ tde_branch_to_build }}
    set_fact:
      tde_branch_version: "{{ tde_branch_to_build | regex_search('[0-9]+\\.[0-9]+(\\.[0-9]+)?') | default('', true) }}"

  - name: Choose pg_tde build system (meson for main / version > 2.2.0, else PGXS make)
    set_fact:
      tde_use_meson: "{{ (tde_branch_version | length == 0) or (tde_branch_version is version('2.2.0', '>')) }}"

  - name: Log selected pg_tde build system
    debug:
      msg: "pg_tde branch={{ tde_branch_to_build }} version='{{ tde_branch_version }}' -> {{ 'meson' if (tde_use_meson | bool) else 'PGXS make' }}"

  # -------------------------------------------------------------------------
  # meson build path (pg_tde 2.2.0+ / main)
  # -------------------------------------------------------------------------
  - name: Build and install pg_tde via meson against {{ pg_config_path }}
    become: true
    become_user: postgres
    shell: |
      {% if ansible_os_family == 'RedHat' and ansible_distribution_major_version == '9' %}
      source /opt/rh/gcc-toolset-14/enable
      {% endif %}
      set -o pipefail
      rm -rf "{{ tde_build_dest }}"
      meson setup --buildtype=release \
        -Dpg_config={{ pg_config_path }} \
        -Dwerror=false \
        "{{ tde_build_dest }}" 2>&1 | tee {{ tde_build_log }}
      meson install -C "{{ tde_build_dest }}" 2>&1 | tee {{ tde_install_log }}
    args:
      chdir: "{{ tde_src_dest }}"
      executable: /bin/bash
    environment:
      PATH: "{{ pg_bin_dir }}:/usr/bin:/usr/local/bin:{{ ansible_env.PATH }}"
      LD_LIBRARY_PATH: "{{ pg_lib_dir }}:{{ ansible_env.LD_LIBRARY_PATH | default('') }}"
    register: tde_meson_result
    ignore_errors: true
    when: tde_use_meson | bool

  - name: Show pg_tde meson build output
    debug:
      var: tde_meson_result.stdout_lines
    when: tde_use_meson | bool

  # -------------------------------------------------------------------------
  # PGXS build path (pg_tde 2.1.x and older — Makefile only)
  # -------------------------------------------------------------------------
  - name: Build and install pg_tde via PGXS against {{ pg_config_path }}
    become: true
    shell: |
      {% if ansible_os_family == 'RedHat' and ansible_distribution_major_version == '9' %}
      source /opt/rh/gcc-toolset-14/enable
      {% endif %}
      set -o pipefail
      make USE_PGXS=1 PG_CONFIG={{ pg_config_path }} -j"$(nproc)" 2>&1 | tee {{ tde_build_log }}
      make USE_PGXS=1 PG_CONFIG={{ pg_config_path }} install 2>&1 | tee {{ tde_install_log }}
    args:
      chdir: "{{ tde_src_dest }}"
      executable: /bin/bash
    environment:
      PATH: "{{ pg_bin_dir }}:/usr/bin:/usr/local/bin:{{ ansible_env.PATH }}"
      LD_LIBRARY_PATH: "{{ pg_lib_dir }}:{{ ansible_env.LD_LIBRARY_PATH | default('') }}"
    register: tde_pgxs_result
    ignore_errors: true
    when: not (tde_use_meson | bool)

  - name: Show pg_tde PGXS build output
    debug:
      var: tde_pgxs_result.stdout_lines
    when: not (tde_use_meson | bool)

  # -------------------------------------------------------------------------
  # Fail if whichever build path ran did not succeed
  # -------------------------------------------------------------------------
  - name: Fail if pg_tde meson build failed
    fail:
      msg: "pg_tde meson build failed (branch={{ tde_branch_to_build }}, pg_config={{ pg_config_path }}). See {{ tde_build_log }} / {{ tde_install_log }}"
    when:
      - tde_use_meson | bool
      - tde_meson_result.rc | default(1) != 0

  - name: Fail if pg_tde PGXS build failed
    fail:
      msg: "pg_tde PGXS build failed (branch={{ tde_branch_to_build }}, pg_config={{ pg_config_path }}). See {{ tde_build_log }} / {{ tde_install_log }}"
    when:
      - not (tde_use_meson | bool)
      - tde_pgxs_result.rc | default(1) != 0
