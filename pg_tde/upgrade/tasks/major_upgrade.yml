---
# Perform a major PostgreSQL version upgrade using pg_upgrade --link.
#
# pg_upgrade checks that all loadable libraries referenced in the FROM cluster
# can actually be loaded in the TO cluster.  pg_tde intercepts dynamic LOAD
# with "can only be loaded at server startup", so pg_tde MUST be present in the
# TO cluster's shared_preload_libraries BEFORE pg_upgrade runs its library check.
#
# RHEL  : initdb creates the TO data directory.
# Debian: pg_createcluster creates the TO data directory (Percona packages do
#         not auto-create the cluster on install).
#
# Steps:
#   1.  Enable Percona repo for TO version
#   2.  Install TO PostgreSQL packages
#   3.  Install or build pg_tde for TO version
#   RHEL:
#     4.  Stop FROM cluster
#     5.  initdb TO cluster (--no-data-checksums)
#     6.  Stop TO cluster
#   Debian:
#     4.  pg_createcluster TO main
#     5.  Stop all PostgreSQL clusters
#   SHARED:
#     7.  Add pg_tde to TO cluster postgresql.conf  ← BEFORE pg_upgrade
#     8.  pg_upgrade --link
#   Debian post-upgrade:
#     9.  pg_dropcluster FROM main
#   SHARED:
#    10.  Start TO cluster
#    11.  Wait for TO cluster to be ready
#    12.  ALTER EXTENSION pg_tde UPDATE
#    13.  vacuumdb --all --analyze-in-stages

  # --- Enable repo for TO major version ---
  - name: Enable Percona repo for TO major version
    command: percona-release enable-only {{ to_version_str }} {{ repo }}

  # --- Install TO PostgreSQL packages ---
  - name: Install PostgreSQL TO version packages (RHEL)
    include_tasks:
      file: install_pg_packages_rhel.yml
    vars:
      pg_major:        "{{ to_major_version }}"
      pg_full_version: "{{ to_full_version }}"
    when: ansible_os_family == "RedHat"

  - name: Install PostgreSQL TO version packages (Debian)
    include_tasks:
      file: install_pg_packages_deb.yml
    vars:
      pg_major: "{{ to_major_version }}"
    when: ansible_os_family == "Debian"

  # --- Install or build pg_tde for TO version ---
  - name: Install pg_tde packages for TO version (packages path)
    include_tasks:
      file: install_tde_packages.yml
    vars:
      pg_major: "{{ to_major_version }}"
    when: install_from_packages | bool

  - name: Build pg_tde from FROM_TDE_BRANCH against TO PG (source, TDE_UPGRADE=false)
    include_tasks:
      file: build_tde_source.yml
    vars:
      tde_branch_to_build: "{{ from_tde_branch }}"
      tde_src_dest:        "/tmp/pg_tde_to"
      tde_build_dest:      "/tmp/pg_tde_to-build"
      pg_config_path:      "{{ to_pg_config_bin }}"
      pg_bin_dir:          "{{ to_pg_bin_dir }}"
      pg_lib_dir:          "{{ to_pg_lib_dir }}"
      tde_build_log:       "/tmp/tde-to-build.log"
      tde_install_log:     "/tmp/tde-to-install.log"
    when:
      - not (install_from_packages | bool)
      - not (tde_upgrade | bool)

  - name: Build pg_tde from TO_TDE_BRANCH against TO PG (source, TDE_UPGRADE=true)
    include_tasks:
      file: build_tde_source.yml
    vars:
      tde_branch_to_build: "{{ to_tde_branch }}"
      tde_src_dest:        "/tmp/pg_tde_to"
      tde_build_dest:      "/tmp/pg_tde_to-build"
      pg_config_path:      "{{ to_pg_config_bin }}"
      pg_bin_dir:          "{{ to_pg_bin_dir }}"
      pg_lib_dir:          "{{ to_pg_lib_dir }}"
      tde_build_log:       "/tmp/tde-to-build.log"
      tde_install_log:     "/tmp/tde-to-install.log"
    when:
      - not (install_from_packages | bool)
      - tde_upgrade | bool

  # ==========================================================================
  # RHEL: initdb TO cluster, stop FROM and TO so pg_upgrade can take over
  # ==========================================================================

  - name: Stop PostgreSQL FROM cluster (RHEL)
    service:
      name: "{{ from_pg_service }}"
      state: stopped
    become: true
    when: ansible_os_family == "RedHat"

  - name: Initialize TO data directory (RHEL)
    command: /usr/pgsql-{{ to_major_version }}/bin/postgresql-{{ to_major_version }}-setup initdb
    become: true
    environment:
      PGSETUP_INITDB_OPTIONS: "--no-data-checksums"
    when: ansible_os_family == "RedHat"
    ignore_errors: true

  - name: Stop auto-started TO cluster before pg_upgrade (RHEL)
    service:
      name: "{{ to_pg_service }}"
      state: stopped
    become: true
    when: ansible_os_family == "RedHat"
    ignore_errors: true

  # ==========================================================================
  # Debian: create TO cluster, stop all clusters
  #
  # Percona Debian packages do NOT auto-create the cluster on install, so we
  # call pg_createcluster manually to initialize the TO data directory.
  # ==========================================================================

  - name: Create TO cluster data directory (Debian)
    command: pg_createcluster {{ to_major_version }} main
    become: true
    when: ansible_os_family == "Debian"
    ignore_errors: true

  - name: Stop all PostgreSQL clusters (Debian)
    service:
      name: postgresql
      state: stopped
    become: true
    when: ansible_os_family == "Debian"

  # ==========================================================================
  # Configure pg_tde in TO cluster BEFORE pg_upgrade.
  #
  # pg_upgrade starts a test server against the TO installation to check that
  # all loadable libraries can be loaded.  pg_tde refuses dynamic LOAD with
  # "can only be loaded at server startup", so shared_preload_libraries must
  # include pg_tde in the TO cluster's postgresql.conf before pg_upgrade runs.
  # ==========================================================================

  - name: Add pg_tde to TO postgresql.conf before pg_upgrade
    include_tasks:
      file: configure_tde_conf.yml
    vars:
      pg_conf: "{{ to_pg_conf }}"

  # ==========================================================================
  # Run pg_upgrade --link (both RHEL and Debian use the same template vars)
  # ==========================================================================

  - name: Run pg_upgrade --link from {{ from_major_version }} to {{ to_major_version }}
    become: true
    become_user: postgres
    shell: |
      set -o pipefail
      {{ to_pg_bin_dir }}/pg_upgrade \
        --old-bindir={{ from_pg_bin_dir }} \
        --new-bindir={{ to_pg_bin_dir }} \
        --old-datadir={{ from_pg_data_dir }} \
        --new-datadir={{ to_pg_data_dir }} \
        --link \
        2>&1 | tee /tmp/pg_upgrade.log
    args:
      executable: /bin/bash
      chdir: /tmp
    register: pg_upgrade_result
    ignore_errors: true

  - name: Show pg_upgrade output
    debug:
      var: pg_upgrade_result.stdout_lines

  - name: Show pg_upgrade stderr on failure
    debug:
      var: pg_upgrade_result.stderr_lines
    when: pg_upgrade_result.rc | default(1) != 0

  - name: Fail if pg_upgrade failed
    fail:
      msg: "pg_upgrade failed (rc={{ pg_upgrade_result.rc | default(1) }}). See /tmp/pg_upgrade.log"
    when: pg_upgrade_result.rc | default(1) != 0

  # ==========================================================================
  # Debian post-upgrade: drop old FROM cluster
  # ==========================================================================

  - name: Drop old PG {{ from_major_version }} cluster (Debian)
    become: true
    become_user: postgres
    command: pg_dropcluster {{ from_major_version }} main
    ignore_errors: true
    when: ansible_os_family == "Debian"

  # ==========================================================================
  # Start TO cluster
  # ==========================================================================

  - name: Start TO PostgreSQL cluster (RHEL)
    service:
      name: "{{ to_pg_service }}"
      state: started
    become: true
    when: ansible_os_family == "RedHat"

  - name: Start TO PostgreSQL cluster (Debian)
    command: pg_ctlcluster {{ to_major_version }} main start
    become: true
    when: ansible_os_family == "Debian"

  - name: Wait for TO PostgreSQL to be ready
    become: true
    become_user: postgres
    shell: pg_isready -h {{ to_pg_socket_dir }} -p 5432
    args:
      executable: /bin/bash
    environment:
      PATH: "{{ to_pg_bin_dir }}:{{ ansible_env.PATH }}"
    register: pg_ready_to
    until: pg_ready_to.rc == 0
    retries: 15
    delay: 5

  - name: Update pg_tde extension catalog in upgraded cluster
    become: true
    become_user: postgres
    shell: psql -d postgres -c "ALTER EXTENSION pg_tde UPDATE;"
    args:
      executable: /bin/bash
    environment:
      PGHOST: "{{ to_pg_socket_dir }}"
      PGPORT: "5432"
      PATH:   "{{ to_pg_bin_dir }}:{{ ansible_env.PATH }}"
    ignore_errors: true
    register: ext_update_major

  - name: Show ALTER EXTENSION result
    debug:
      var: ext_update_major.stdout_lines

  - name: Run post-upgrade vacuum analyze on all databases
    become: true
    become_user: postgres
    shell: vacuumdb --all --analyze-in-stages
    args:
      executable: /bin/bash
    environment:
      PGHOST: "{{ to_pg_socket_dir }}"
      PGPORT: "5432"
      PATH:   "{{ to_pg_bin_dir }}:{{ ansible_env.PATH }}"
    ignore_errors: true
