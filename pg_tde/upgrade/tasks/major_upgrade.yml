---
# Perform a major PostgreSQL version upgrade.
#
# RHEL path  : initdb new cluster → pg_upgrade --link
# Debian path: pg_upgradecluster (Debian-native tool; creates new cluster
#              internally so the TO data directory must NOT exist beforehand)
#
# Steps:
#   1. Enable Percona repo for TO version
#   2. Install TO major version PostgreSQL packages
#   3. Install or build pg_tde for TO version
#   RHEL:
#     4. Stop FROM cluster
#     5. initdb TO cluster (PGSETUP_INITDB_OPTIONS=--no-data-checksums)
#     6. Stop auto-created TO cluster so pg_upgrade can take over
#     7. pg_upgrade --link
#   Debian:
#     4. Stop all PostgreSQL clusters
#     5. pg_upgradecluster FROM_MAJOR main
#     6. Drop old FROM cluster
#     7. Stop new TO cluster (so we can edit postgresql.conf)
#   8. Add pg_tde to TO cluster postgresql.conf
#   9. Start TO cluster
#  10. Wait for TO cluster to be ready
#  11. ALTER EXTENSION pg_tde UPDATE
#  12. vacuumdb --all --analyze-in-stages

  # --- Enable repo for TO major version ---
  - name: Enable Percona repo for TO major version
    command: percona-release enable-only {{ to_version_str }} {{ repo }}

  # --- Install TO PostgreSQL packages ---
  - name: Install PostgreSQL TO version packages (RHEL)
    include_tasks:
      file: install_pg_packages_rhel.yml
    vars:
      pg_major:        "{{ to_major_version }}"
      pg_full_version: "{{ to_full_version }}"
    when: ansible_os_family == "RedHat"

  - name: Install PostgreSQL TO version packages (Debian)
    include_tasks:
      file: install_pg_packages_deb.yml
    vars:
      pg_major: "{{ to_major_version }}"
    when: ansible_os_family == "Debian"

  # --- Install or build pg_tde for TO version ---
  - name: Install pg_tde packages for TO version (packages path)
    include_tasks:
      file: install_tde_packages.yml
    vars:
      pg_major: "{{ to_major_version }}"
    when: install_from_packages | bool

  - name: Build pg_tde from FROM_TDE_BRANCH against TO PG (source, TDE_UPGRADE=false)
    include_tasks:
      file: build_tde_source.yml
    vars:
      tde_branch_to_build: "{{ from_tde_branch }}"
      tde_src_dest:        "/tmp/pg_tde_to"
      tde_build_dest:      "/tmp/pg_tde_to-build"
      pg_config_path:      "{{ to_pg_config_bin }}"
      pg_bin_dir:          "{{ to_pg_bin_dir }}"
      pg_lib_dir:          "{{ to_pg_lib_dir }}"
      tde_build_log:       "/tmp/tde-to-build.log"
      tde_install_log:     "/tmp/tde-to-install.log"
    when:
      - not (install_from_packages | bool)
      - not (tde_upgrade | bool)

  - name: Build pg_tde from TO_TDE_BRANCH against TO PG (source, TDE_UPGRADE=true)
    include_tasks:
      file: build_tde_source.yml
    vars:
      tde_branch_to_build: "{{ to_tde_branch }}"
      tde_src_dest:        "/tmp/pg_tde_to"
      tde_build_dest:      "/tmp/pg_tde_to-build"
      pg_config_path:      "{{ to_pg_config_bin }}"
      pg_bin_dir:          "{{ to_pg_bin_dir }}"
      pg_lib_dir:          "{{ to_pg_lib_dir }}"
      tde_build_log:       "/tmp/tde-to-build.log"
      tde_install_log:     "/tmp/tde-to-install.log"
    when:
      - not (install_from_packages | bool)
      - tde_upgrade | bool

  # ==========================================================================
  # RHEL upgrade path: initdb + pg_upgrade --link
  # ==========================================================================

  - name: Stop PostgreSQL FROM cluster (RHEL)
    service:
      name: "{{ from_pg_service }}"
      state: stopped
    become: true
    when: ansible_os_family == "RedHat"

  - name: Initialize TO data directory (RHEL)
    command: /usr/pgsql-{{ to_major_version }}/bin/postgresql-{{ to_major_version }}-setup initdb
    become: true
    environment:
      PGSETUP_INITDB_OPTIONS: "--no-data-checksums"
    when: ansible_os_family == "RedHat"
    ignore_errors: true

  - name: Stop auto-started TO cluster before pg_upgrade (RHEL)
    service:
      name: "{{ to_pg_service }}"
      state: stopped
    become: true
    when: ansible_os_family == "RedHat"
    ignore_errors: true

  - name: Run pg_upgrade --link from {{ from_major_version }} to {{ to_major_version }} (RHEL)
    become: true
    become_user: postgres
    shell: |
      set -o pipefail
      {{ to_pg_bin_dir }}/pg_upgrade \
        --old-bindir={{ from_pg_bin_dir }} \
        --new-bindir={{ to_pg_bin_dir }} \
        --old-datadir={{ from_pg_data_dir }} \
        --new-datadir={{ to_pg_data_dir }} \
        --link \
        2>&1 | tee /tmp/pg_upgrade.log
    args:
      executable: /bin/bash
      chdir: /tmp
    register: pg_upgrade_result
    ignore_errors: true
    when: ansible_os_family == "RedHat"

  - name: Show pg_upgrade output (RHEL)
    debug:
      var: pg_upgrade_result.stdout_lines
    when: ansible_os_family == "RedHat"

  - name: Show pg_upgrade stderr on failure (RHEL)
    debug:
      var: pg_upgrade_result.stderr_lines
    when:
      - ansible_os_family == "RedHat"
      - pg_upgrade_result.rc | default(1) != 0

  - name: Fail if pg_upgrade failed (RHEL)
    fail:
      msg: "pg_upgrade failed (rc={{ pg_upgrade_result.rc | default(1) }}). See /tmp/pg_upgrade.log"
    when:
      - ansible_os_family == "RedHat"
      - pg_upgrade_result.rc | default(1) != 0

  # ==========================================================================
  # Debian upgrade path: pg_upgradecluster
  #
  # pg_upgradecluster handles cluster creation, runs pg_upgrade internally,
  # and starts the new cluster when done. The TO data directory must NOT exist
  # beforehand — Percona's Debian package does not auto-create it on install.
  # ==========================================================================

  - name: Stop all PostgreSQL clusters (Debian)
    service:
      name: postgresql
      state: stopped
    become: true
    when: ansible_os_family == "Debian"

  - name: Run pg_upgradecluster {{ from_major_version }} main (Debian)
    become: true
    become_user: postgres
    command: pg_upgradecluster {{ from_major_version }} main
    register: pg_upgradecluster_result
    ignore_errors: true
    when: ansible_os_family == "Debian"

  - name: Show pg_upgradecluster output (Debian)
    debug:
      var: pg_upgradecluster_result.stdout_lines
    when: ansible_os_family == "Debian"

  - name: Fail if pg_upgradecluster failed (Debian)
    fail:
      msg: "pg_upgradecluster failed (rc={{ pg_upgradecluster_result.rc | default(1) }}). Check journalctl logs."
    when:
      - ansible_os_family == "Debian"
      - pg_upgradecluster_result.rc | default(1) != 0

  - name: Drop old PG {{ from_major_version }} cluster (Debian)
    become: true
    become_user: postgres
    command: pg_dropcluster {{ from_major_version }} main
    ignore_errors: true
    when: ansible_os_family == "Debian"

  - name: Stop TO cluster to apply pg_tde config (Debian)
    command: pg_ctlcluster {{ to_major_version }} main stop
    become: true
    ignore_errors: true
    when: ansible_os_family == "Debian"

  # ==========================================================================
  # Configure pg_tde and start TO cluster (both RHEL and Debian)
  # ==========================================================================

  - name: Add pg_tde to TO postgresql.conf
    include_tasks:
      file: configure_tde_conf.yml
    vars:
      pg_conf: "{{ to_pg_conf }}"

  - name: Start TO PostgreSQL cluster (RHEL)
    service:
      name: "{{ to_pg_service }}"
      state: started
    become: true
    when: ansible_os_family == "RedHat"

  - name: Start TO PostgreSQL cluster (Debian)
    command: pg_ctlcluster {{ to_major_version }} main start
    become: true
    when: ansible_os_family == "Debian"

  - name: Wait for TO PostgreSQL to be ready
    become: true
    become_user: postgres
    shell: pg_isready -h {{ to_pg_socket_dir }} -p 5432
    args:
      executable: /bin/bash
    environment:
      PATH: "{{ to_pg_bin_dir }}:{{ ansible_env.PATH }}"
    register: pg_ready_to
    until: pg_ready_to.rc == 0
    retries: 15
    delay: 5

  - name: Update pg_tde extension catalog in upgraded cluster
    become: true
    become_user: postgres
    shell: psql -d postgres -c "ALTER EXTENSION pg_tde UPDATE;"
    args:
      executable: /bin/bash
    environment:
      PGHOST: "{{ to_pg_socket_dir }}"
      PGPORT: "5432"
      PATH:   "{{ to_pg_bin_dir }}:{{ ansible_env.PATH }}"
    ignore_errors: true
    register: ext_update_major

  - name: Show ALTER EXTENSION result
    debug:
      var: ext_update_major.stdout_lines

  - name: Run post-upgrade vacuum analyze on all databases
    become: true
    become_user: postgres
    shell: vacuumdb --all --analyze-in-stages
    args:
      executable: /bin/bash
    environment:
      PGHOST: "{{ to_pg_socket_dir }}"
      PGPORT: "5432"
      PATH:   "{{ to_pg_bin_dir }}:{{ ansible_env.PATH }}"
    ignore_errors: true
