---
# Install Percona PostgreSQL packages for a given major version on RHEL/Rocky/OL.
# Caller must pass:
#   pg_major        - e.g. "16"
#   pg_full_version - e.g. "16.4" (used to decide whether llvmjit is available)

  # Disable the distro's postgresql AppStream module (EL8/EL9) so its
  # postgresql<major>-server package is never pulled in. EL10 has no modules
  # (modularity removed) — there the distro package is excluded in redhat_tasks.
  - name: Disable distro postgresql dnf module before installing PG {{ pg_major }} (EL8/EL9)
    command: dnf module disable postgresql -y
    become: true
    ignore_errors: true
    when: ansible_distribution_major_version in ["8", "9"]

  - name: Install Percona PostgreSQL {{ pg_major }} packages (RHEL 8)
    yum:
      name:
        - percona-postgresql-client-common
        - percona-postgresql-common
        - "percona-postgresql{{ pg_major }}"
        - "percona-postgresql{{ pg_major }}-contrib"
        - "percona-postgresql{{ pg_major }}-devel"
        - "percona-postgresql{{ pg_major }}-libs"
        - "percona-postgresql{{ pg_major }}-llvmjit"
        - "percona-postgresql{{ pg_major }}-server"
      state: latest
      update_cache: true
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"
    when: ansible_distribution_major_version == "8"

  - name: Install Percona PostgreSQL {{ pg_major }} packages (RHEL 9/10)
    yum:
      name:
        - percona-postgresql-client-common
        - percona-postgresql-common
        - "percona-postgresql{{ pg_major }}"
        - "percona-postgresql{{ pg_major }}-contrib"
        - "percona-postgresql{{ pg_major }}-devel"
        - "percona-postgresql{{ pg_major }}-libs"
        - "percona-postgresql{{ pg_major }}-llvmjit"
        - "percona-postgresql{{ pg_major }}-server"
      state: latest
      update_cache: true
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"
    when: ansible_distribution_major_version != "8"
