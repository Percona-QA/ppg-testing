---
  - name: Run check tde tests
    shell: |
      export PGCTLTIMEOUT=120
      export PG_TEST_TIMEOUT_DEFAULT=300
      set -o pipefail
      meson test --no-rebuild --timeout-multiplier=1000 --print-errorlogs -C /tmp/pg_tde-build 2>&1 | tee /tmp/check-tde-regression.log
      # cd /tmp/pg_tde && make -s installcheck USE_PGXS=1 -k PROVE_FLAGS='-v -p' 2>&1 | tee /tmp/check-tde-regression.log
      # cd /tmp/pg_tde && make -s installcheck -k
    become_user: postgres
    args:
      executable: /bin/bash
      chdir: "/tmp/pg_tde"
    environment:
      PG_TEST_PORT_DIR: "/tmp/pg_tde"
      PGHOST: "/run/postgresql, /tmp"
      PGPORT: "5432"
      LANG: "C.UTF-8"
      LC_CTYPE: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      PGCTLTIMEOUT: "120"
      PG_TEST_TIMEOUT_DEFAULT: "300"
    ignore_errors: true
    register: regression

  - name: Show stdout of check tde tests
    debug:
      var: regression.stdout_lines

  - name: Show stderr if test fails
    debug:
      var: regression.stderr_lines
    when:
      - regression is defined
      - regression.rc != 0

  - name: Show meson test summary on failure
    shell: cat /tmp/pg_tde-build/meson-logs/testlog.txt 2>/dev/null || true
    register: testlog_output
    when:
      - regression is defined
      - regression.rc != 0
    ignore_errors: true

  - debug:
      var: testlog_output.stdout_lines
    when:
      - regression is defined
      - regression.rc != 0

  - name: Package tde test artifacts
    # Triggered on: build failure, install failure, or test failure
    shell: |
      set -uo pipefail
      ARTIFACT_BASENAME="{{ artifact_filename | replace('.tar.gz', '') }}"
      ARTIFACT_DIR="/tmp/$ARTIFACT_BASENAME"
      rm -rf "$ARTIFACT_DIR"
      mkdir -p "$ARTIFACT_DIR"
      # Full source and build trees
      cp -r /tmp/pg_tde "$ARTIFACT_DIR/pg_tde" 2>/dev/null || true
      cp -r /tmp/pg_tde-build "$ARTIFACT_DIR/pg_tde-build" 2>/dev/null || true
      # Runtime keyring/provider files written directly to /tmp by tests
      cp /tmp/*.per "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/pg_tde_change_key_provider-* "$ARTIFACT_DIR/" 2>/dev/null || true
      # Collect PostgreSQL system service log (RHEL path)
      find /var/lib/pgsql -name "*.log" -type f -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
      cp /tmp/tde-build.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/tde-install.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/kmip-build.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/check-tde-regression.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/bao-server.log "$ARTIFACT_DIR/" 2>/dev/null || true
      tar -czf "/tmp/{{ artifact_filename }}" -C /tmp "$ARTIFACT_BASENAME"
    args:
      executable: /bin/bash
    become: true
    when: >
      (tde_build_output is defined and tde_build_output.rc | default(1) != 0) or
      (tde_install_output is defined and tde_install_output.rc | default(1) != 0) or
      (regression is defined and regression.rc != 0)
    ignore_errors: true

  - name: Fetch tde test artifacts to controller
    fetch:
      src: "/tmp/{{ artifact_filename }}"
      dest: "{{ playbook_dir }}/../artifacts/"
      fail_on_missing: false
    when: >
      (tde_build_output is defined and tde_build_output.rc | default(1) != 0) or
      (tde_install_output is defined and tde_install_output.rc | default(1) != 0) or
      (regression is defined and regression.rc != 0)

  - name: Fail the playbook if tde build failed
    fail:
      msg: "pg_tde build failed with return code {{ tde_build_output.rc }}"
    when:
      - tde_build_output is defined
      - tde_build_output.rc | default(1) != 0

  - name: Fail the playbook if tde install failed
    fail:
      msg: "pg_tde install failed with return code {{ tde_install_output.rc }}"
    when:
      - tde_install_output is defined
      - tde_install_output.rc | default(1) != 0

  - name: Fail the playbook if tde tests failed
    fail:
      msg: "TDE regression tests failed with return code {{ regression.rc }}"
    when:
      - regression is defined
      - regression.rc != 0