---
  # -------------------------------------------------------------------------
  # Diagnose cosmian_kms startup on RHEL 9/10 BEFORE running meson test.
  # kmip.pl uses CosmianKms.pm which spawns cosmian_kms via IPC::Run and polls
  # an HTTPS readiness endpoint for 15 seconds. If cosmian_kms does not become
  # ready in time the test bails out. This block collects the info needed to
  # determine whether the root cause is:
  #   (a) binary execution failure (crash / missing dep / wrong arch)
  #   (b) SELinux AVC denial preventing port bind or network accept
  #   (c) slow startup (needs longer timeout in CosmianKms.pm)
  # -------------------------------------------------------------------------
  # -------------------------------------------------------------------------
  # Previous diagnostic confirmed: cosmian_kms binary works fine, HTTP starts
  # in <10s, SELinux (even Permissive on OL9) is NOT the cause. The actual
  # kmip.pl test uses FULL TLS (server.p12 + [socket_server]) and polls
  # https:// — our previous diagnostic used plain HTTP. This updated diagnostic
  # generates real TLS certs (same as CosmianKms.pm gen_certs()), writes a
  # TOML matching kmip.pl exactly, then times how long TLS HTTPS startup takes.
  # -------------------------------------------------------------------------
  - name: Diagnose cosmian_kms TLS startup timing on RHEL 9/10
    become: true
    ansible.builtin.shell: |
      set -eo pipefail
      echo "=== ldd of cosmian_kms ==="
      ldd /usr/sbin/cosmian_kms 2>&1 || echo "ldd failed"
      echo "=== SELinux status ==="
      getenforce 2>/dev/null || echo "not available"
      echo "=== Entropy available ==="
      cat /proc/sys/kernel/random/entropy_avail 2>/dev/null || echo "n/a"
      echo "=== TLS startup test (mirrors CosmianKms.pm gen_certs + _write_toml) ==="
      TLSDIR=$(mktemp -d /tmp/kms-tls-XXXXXX)
      # Generate certs exactly as gen_certs() does
      openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
        -keyout $TLSDIR/ca.key -out $TLSDIR/ca.pem \
        -subj '/CN=pg_tde-test-ca' 2>&1
      openssl req -newkey rsa:2048 -nodes \
        -keyout $TLSDIR/server.key -out $TLSDIR/server.csr \
        -subj '/CN=127.0.0.1' -addext 'subjectAltName=IP:127.0.0.1' 2>&1
      openssl x509 -req -in $TLSDIR/server.csr \
        -CA $TLSDIR/ca.pem -CAkey $TLSDIR/ca.key -CAcreateserial \
        -days 1 -out $TLSDIR/server.pem -copy_extensions copy 2>&1
      openssl pkcs12 -export -out $TLSDIR/server.p12 \
        -inkey $TLSDIR/server.key -in $TLSDIR/server.pem \
        -password pass:test 2>&1
      echo "--- certs generated ---"
      # Write TOML matching _write_toml() exactly (ports 17801=kmip, 17802=http)
      cat > $TLSDIR/kms.toml << TOML
      default_username = "admin"

      [db]
      database_type = "sqlite"
      sqlite_path   = "$TLSDIR/db"
      clear_database = true

      [tls]
      tls_p12_file         = "$TLSDIR/server.p12"
      tls_p12_password     = "test"
      clients_ca_cert_file = "$TLSDIR/ca.pem"

      [socket_server]
      socket_server_start    = true
      socket_server_port     = 17801
      socket_server_hostname = "127.0.0.1"

      [http]
      port     = 17802
      hostname = "127.0.0.1"

      [logging]
      rust_log = "info,cosmian_kms=info"
      TOML
      # Start cosmian_kms with full TLS config
      /usr/sbin/cosmian_kms -c $TLSDIR/kms.toml > $TLSDIR/kms.stdout 2>$TLSDIR/kms.stderr &
      KMS_PID=$!
      START_MS=$(date +%s%3N)
      echo "--- polling https://127.0.0.1:17802/version (up to 60s, 1s interval) ---"
      READY=0
      for i in $(seq 1 60); do
        sleep 1
        if curl -fsSk -m 2 https://127.0.0.1:17802/version > /dev/null 2>&1; then
          NOW_MS=$(date +%s%3N)
          echo "HTTPS READY after $((NOW_MS - START_MS))ms (attempt $i)"
          curl -fsSk -m 2 https://127.0.0.1:17802/version 2>&1
          READY=1
          break
        fi
        echo "  attempt $i: not ready (${i}s elapsed)"
      done
      [ "$READY" = "0" ] && echo "HTTPS NOT READY after 60s"
      echo "--- cosmian_kms stdout (first 60 lines) ---"
      head -60 $TLSDIR/kms.stdout 2>/dev/null || echo "(empty)"
      echo "--- cosmian_kms stderr (first 20 lines) ---"
      head -20 $TLSDIR/kms.stderr 2>/dev/null || echo "(empty)"
      echo "--- AVC denials (TLS phase) ---"
      ausearch -m AVC -ts recent 2>/dev/null | tail -30 || echo "none / ausearch unavailable"
      kill $KMS_PID 2>/dev/null || true
      rm -rf $TLSDIR
    args:
      executable: /bin/bash
    register: cosmian_diag
    ignore_errors: true
    when: ansible_distribution_major_version in ['9', '10']

  - name: Show cosmian_kms diagnostic output
    debug:
      var: cosmian_diag.stdout_lines
    when: ansible_distribution_major_version in ['9', '10']

  - name: Save cosmian_kms diagnostic to file for artifact collection
    ansible.builtin.copy:
      content: "{{ cosmian_diag.stdout | default('') }}\nSTDERR:\n{{ cosmian_diag.stderr | default('') }}"
      dest: /tmp/cosmian-kms-diag.log
    become: true
    ignore_errors: true
    when: ansible_distribution_major_version in ['9', '10']

  - name: Run check tde tests
    shell: |
      export PGCTLTIMEOUT=120
      export PG_TEST_TIMEOUT_DEFAULT=300
      set -o pipefail
      meson test --no-rebuild --timeout-multiplier=1000 --print-errorlogs -C /tmp/pg_tde-build 2>&1 | tee /tmp/check-tde-regression.log
      # cd /tmp/pg_tde && make -s installcheck USE_PGXS=1 -k PROVE_FLAGS='-v -p' 2>&1 | tee /tmp/check-tde-regression.log
      # cd /tmp/pg_tde && make -s installcheck -k
    become_user: postgres
    args:
      executable: /bin/bash
      chdir: "/tmp/pg_tde"
    environment:
      PG_TEST_PORT_DIR: "/tmp/pg_tde"
      PGHOST: "/run/postgresql, /tmp"
      PGPORT: "5432"
      LANG: "C.UTF-8"
      LC_CTYPE: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      PGCTLTIMEOUT: "120"
      PG_TEST_TIMEOUT_DEFAULT: "300"
    ignore_errors: true
    register: regression

  - name: Show stdout of check tde tests
    debug:
      var: regression.stdout_lines

  - name: Show stderr if test fails
    debug:
      var: regression.stderr_lines
    when:
      - regression is defined
      - regression.rc != 0

  - name: Show tde regression diffs if tests failed
    shell: |
      # meson writes regression.diffs to the build dir
      cat /tmp/pg_tde-build/regression.diffs 2>/dev/null || \
      cat /tmp/pg_tde/regression.diffs 2>/dev/null || true
    register: diffs_output
    when:
      - regression is defined
      - regression.rc != 0
    ignore_errors: true

  - name: Print tde regression diffs
    debug:
      msg: "{{ diffs_output.stdout_lines }}"
    when:
      - regression is defined
      - regression.rc != 0
      - diffs_output is defined

  - name: Debug - find regression files and results dirs before packaging
    shell: |
      echo "=== regression.out files ==="
      find /tmp/pg_tde-build /tmp/pg_tde -name "regression.out" 2>/dev/null || true
      echo "=== regression.diffs files ==="
      find /tmp/pg_tde-build /tmp/pg_tde -name "regression.diffs" 2>/dev/null || true
      echo "=== results/ directories (outside tmp_check) ==="
      find /tmp/pg_tde -type d -name "results" -not -path "*/tmp_check/*" 2>/dev/null || true
    args:
      executable: /bin/bash
    register: debug_regression
    ignore_errors: true
    become: true
    when: regression is defined

  - debug:
      var: debug_regression.stdout_lines
    when: regression is defined

  - name: Package tde test artifacts
    shell: |
      set -uo pipefail
      ARTIFACT_BASENAME="{{ artifact_filename | replace('.tar.gz', '') }}"
      ARTIFACT_DIR="/tmp/$ARTIFACT_BASENAME"
      rm -rf "$ARTIFACT_DIR"
      mkdir -p "$ARTIFACT_DIR"
      # SQL regression diffs/results — meson writes these to the build dir, not source dir
      cp /tmp/pg_tde-build/regression.diffs "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/pg_tde-build/regression.out   "$ARTIFACT_DIR/" 2>/dev/null || true
      # Legacy: also check source dir in case make installcheck path is used
      find /tmp/pg_tde -name "regression.diffs" -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
      find /tmp/pg_tde -name "regression.out" -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
      # Full meson test log — contains complete stdout/stderr per test including
      # cosmian_kms stderr, bao errors, and TAP output (critical for RHEL debugging)
      cp -r /tmp/pg_tde-build/meson-logs "$ARTIFACT_DIR/meson-logs" 2>/dev/null || true
      # Per-test log directories created by testwrap (PostgreSQL server logs per test)
      find /tmp/pg_tde-build/testrun -name "*.log" -type f 2>/dev/null | \
        xargs -I{} cp --parents {} "$ARTIFACT_DIR/" || true
      # Collect full wal_archiving testrun dir (data + logs) for replica failure diagnosis
      [ -d /tmp/pg_tde-build/testrun/wal_archiving ] && \
        cp -r /tmp/pg_tde-build/testrun/wal_archiving "$ARTIFACT_DIR/testrun_wal_archiving" 2>/dev/null || true
      cp -r /tmp/pg_tde/t "$ARTIFACT_DIR/pg_tde_t" 2>/dev/null || true
      # tmp_check is in the build dir with meson (source dir path is dead code)
      cp -r /tmp/pg_tde-build/tmp_check "$ARTIFACT_DIR/tmp_check" 2>/dev/null || true
      # Collect standalone results/ directories for pg_regress SQL test outputs
      find /tmp/pg_tde -type d -name "results" -not -path "*/tmp_check/*" | while read d; do
        rel="${d#/tmp/pg_tde/}"
        mkdir -p "$ARTIFACT_DIR/pg_tde/$rel"
        cp -r "$d/." "$ARTIFACT_DIR/pg_tde/$rel/" 2>/dev/null || true
      done
      # Collect PostgreSQL system service log (RHEL path)
      find /var/lib/pgsql -name "*.log" -type f -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
      cp /tmp/tde-build.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/tde-install.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/kmip-build.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/check-tde-regression.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/bao-server.log "$ARTIFACT_DIR/" 2>/dev/null || true
      cp /tmp/cosmian-kms-diag.log "$ARTIFACT_DIR/" 2>/dev/null || true
      tar -czf "/tmp/{{ artifact_filename }}" -C /tmp "$ARTIFACT_BASENAME"
    args:
      executable: /bin/bash
    become: true
    when: regression is defined
    ignore_errors: true

  - name: Fetch tde test artifacts to controller
    fetch:
      src: "/tmp/{{ artifact_filename }}"
      dest: "{{ playbook_dir }}/../artifacts/"
      fail_on_missing: false
    when: regression is defined

  - name: Fail the playbook if tde tests failed
    fail:
      msg: "TDE regression tests failed with return code {{ regression.rc }}"
    when:
      - regression is defined
      - regression.rc != 0