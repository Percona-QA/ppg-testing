# "No such file or directory" which is likely a transient git checkout timing
# issue, not a real test failure. Also check whether shell backtick glob
# expansion on WAL files works correctly with pg_tde binaries in PATH on RHEL.
# Enable the task below only if wal_archiving genuinely fails on RHEL CI.
