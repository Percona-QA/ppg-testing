# Sets up Docker and uses a Ubuntu Jammy container (OpenSSL 3) to run the same
# openssl commands that CosmianKms::gen_certs() would run.  This is needed on
# platforms that ship OpenSSL 1.x (RHEL/Rocky/OL 8, Debian 11) where
# `openssl x509 -copy_extensions copy` is not supported.
#
# The generated certs are written directly to /tmp/cosmian_certs/ on the host
# via a Docker volume mount.  cosmian_kms itself runs natively (its binary is
# statically linked and works on OpenSSL 1.x platforms).
#
# After this task file runs, CosmianKms.pm::gen_certs() is patched (in
# main.yml) to copy from /tmp/cosmian_certs/ instead of calling openssl.

- name: Install yum-utils (RHEL)
  become: true
  ansible.builtin.command: yum install -y yum-utils
  when: ansible_os_family == "RedHat"

- name: Add Docker CE repo (RHEL)
  become: true
  ansible.builtin.command: >
    yum-config-manager --add-repo
    https://download.docker.com/linux/centos/docker-ce.repo
  when: ansible_os_family == "RedHat"

- name: Install Docker CE (RHEL)
  become: true
  ansible.builtin.command: yum install -y docker-ce docker-ce-cli containerd.io
  when: ansible_os_family == "RedHat"

- name: Start Docker service (RHEL)
  become: true
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  when: ansible_os_family == "RedHat"

- name: Install docker.io (Debian)
  become: true
  ansible.builtin.apt:
    name: docker.io
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Show docker version
  ansible.builtin.command: docker -v
  register: docker_version_result
  changed_when: false

- ansible.builtin.debug:
    var: docker_version_result.stdout

- name: Create cosmian certs build directory
  ansible.builtin.file:
    path: /tmp/cosmian_certs_build
    state: directory
    mode: '0755'

- name: Copy cosmian certs Dockerfile
  ansible.builtin.copy:
    src: ../../files/kmip/Dockerfile.cosmian_certs
    dest: /tmp/cosmian_certs_build/Dockerfile

- name: Copy cert generation script
  ansible.builtin.copy:
    src: ../../files/kmip/gen_certs.sh
    dest: /tmp/cosmian_certs_build/gen_certs.sh
    mode: '0755'

- name: Create /tmp/cosmian_certs directory
  ansible.builtin.file:
    path: /tmp/cosmian_certs
    state: directory
    mode: '0755'

- name: Build cosmian-certs Docker image
  become: true
  ansible.builtin.shell: |
    set -o pipefail
    docker build -t cosmian-certs . 2>&1 | tee /tmp/cosmian-certs-build.log
  args:
    chdir: /tmp/cosmian_certs_build
    executable: /bin/bash

- name: Run cosmian-certs container (writes certs to /tmp/cosmian_certs via volume)
  become: true
  ansible.builtin.shell: |
    docker run --rm \
      -v /tmp/cosmian_certs:/opt/cosmian_certs \
      cosmian-certs
  args:
    executable: /bin/bash

- name: Set permissions on /tmp/cosmian_certs for postgres
  become: true
  ansible.builtin.file:
    path: /tmp/cosmian_certs
    state: directory
    recurse: true
    mode: '0755'

- name: Verify certs were generated
  ansible.builtin.stat:
    path: /tmp/cosmian_certs/ca.pem
  register: ca_pem_stat

- name: Fail if cert generation did not produce ca.pem
  ansible.builtin.fail:
    msg: "cosmian-certs container did not produce /tmp/cosmian_certs/ca.pem"
  when: not ca_pem_stat.stat.exists
