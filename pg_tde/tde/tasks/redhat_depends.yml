---
  - name: Setting facts so that they will be persisted in the fact cache
    ansible.builtin.set_fact:
      postgis_rhel_package_name_prefix: "percona-postgis35_{{ major_version }}"

  - debug:
      msg: "Value of postgis_rhel_package_name_prefix is : {{ postgis_rhel_package_name_prefix }}"

  - name: setup epel release
    yum:
      name: epel-release
      update_cache: yes
      state: present

  - name: Clean dnf RHEL8
    become: true
    command: dnf clean all -y
    when: ansible_distribution_major_version == "8"

  - name: Add the user 'postgres'
    ansible.builtin.user:
      name: postgres
      shell: /bin/bash
      uid: 1040
      group: wheel

  - name: Ensure cpanminus is installed
    become: true
    ansible.builtin.package:
      name: cpanminus
      state: present

  - name: Install perl-CPAN and perl-App-cpanminus on Red Hat
    become: true
    yum:
      name: "{{ item }}"
      state: present
    loop:
      - perl-CPAN
      - perl-App-cpanminus

  - name: Install perl module Text::Trim
    become: true
    command: cpanm Text::Trim
    environment:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

  - name: Install Development tools
    become: true
    command: yum -y groupinstall "Development tools" --nobest
    environment:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

  - name: Enable llvm-toolset dnf module for RHEL8
    become: true
    command: dnf module enable llvm-toolset -y
    when: ansible_distribution_major_version == "8"

  - name: Install llvm-toolset
    become: true
    command: yum install -y llvm-toolset clang-devel clang
    environment:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    when: ansible_distribution_major_version == "8"

  - name: Install clang clang-devel on RHEL 9
    become: true
    command: yum install -y clang-devel clang
    environment:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    when: ansible_distribution_major_version == "9"

  - name: Install gcc-toolset-14 for LTO compatibility on RHEL/Rocky/OL 8/9
    become: true
    dnf:
      name: gcc-toolset-14
      state: present
    when:
      - ansible_distribution_major_version == "9"

  - name: install tools
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      packages:
      - clang
      - zlib-devel
      - readline-devel
      - gcc
      - meson
      - ninja-build
      - lz4
      - lz4-devel
      - python3
      - krb5-devel
      - openssl-devel
      - pam-devel
      - libxml2-devel
      - libxslt-devel
      - openldap-devel
      - libuuid-devel
      - systemd-devel
      - tcl-devel
      - python3-devel
      - libicu-devel
      - libzstd
      - libzstd-devel
      - llvm
      - llvm-toolset
      - llvm-devel
      - clang-devel
      - vim
      - git
      - perl-ExtUtils*
      - docbook-xsl
      - perl-Test-Simple
      - perl-CPAN
      - libcurl-devel
      - perl-App-cpanminus
      - make
      - autoconf
      - json-c-devel
      - python3-pip
      - wget
      - perl-LWP-Protocol-https
      - perl-JSON
      - perl-JSON-XS
      - jq
      - numactl-devel

  - name: Install OpenBao
    become: true
    ansible.builtin.shell: |
      OPENBAO_VERSION=2.5.4
      # OpenBao standard binary only ships as tar.gz (not .rpm); HSM variant
      # ships as .rpm but pg_tde requires the standard bao binary.
      # tar.gz arch uses Linux uname convention (x86_64 / arm64 capitalised as Linux_x86_64)
      ARCH_TAR=$(uname -m | sed 's/aarch64/arm64/')
      wget -q https://github.com/openbao/openbao/releases/download/v${OPENBAO_VERSION}/bao_${OPENBAO_VERSION}_Linux_${ARCH_TAR}.tar.gz -O /tmp/openbao.tar.gz
      # Install to /usr/bin so it is in the default RHEL PATH (/usr/local/bin is
      # not included in the minimal PATH that meson test subprocesses inherit on RHEL)
      tar -xzf /tmp/openbao.tar.gz -C /usr/bin bao
      chmod 0755 /usr/bin/bao
      rm -f /tmp/openbao.tar.gz
    args:
      executable: /bin/bash

  - name: Install Cosmian KMS
    become: true
    ansible.builtin.shell: |
      COSMIAN_VERSION=5.21.0
      # RPM dir path uses amd64/arm64 but RPM filename uses x86_64/aarch64 (RPM convention)
      ARCH_DIR=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
      ARCH_RPM=$(uname -m)
      wget -q https://package.cosmian.com/kms/${COSMIAN_VERSION}/rpm/${ARCH_DIR}/non-fips/static/cosmian-kms-server-non-fips-static-openssl_${COSMIAN_VERSION}_${ARCH_RPM}.rpm -O /tmp/cosmian_kms.rpm
      rpm -ivh /tmp/cosmian_kms.rpm || true
      # RPM ships binary + bundled legacy.so as 0500 root:root (same as .deb).
      # postgres user (running meson test / kmip.pl) cannot dlopen() legacy.so
      # without world-execute permission — cosmian_kms crashes silently because
      # IPC::Run redirects its stdout to /dev/null. Mirror the upstream GH CI fix.
      chmod 0755 /usr/sbin/cosmian_kms || true
      chmod 0755 /usr/local/cosmian/lib/ossl-modules/legacy.so || true
      chmod 0755 /usr/local/cosmian/lib/ossl-modules/ || true
      rm -f /tmp/cosmian_kms.rpm
    args:
      executable: /bin/bash

  - name: Display OS and version (Ansible facts)
    ansible.builtin.debug:
      msg:
        - "OS Family      : {{ ansible_os_family }}"
        - "Distribution   : {{ ansible_distribution }}"
        - "Version        : {{ ansible_distribution_version }}"
        - "Major Version  : {{ ansible_distribution_major_version }}"
        - "Kernel         : {{ ansible_kernel }}"

  - name: List all DNF repositories
    ansible.builtin.command: dnf repolist all
    register: dnf_repos_all
    changed_when: false
    when: ansible_os_family == "RedHat"

  - name: Show all repos
    ansible.builtin.debug:
      var: dnf_repos_all.stdout_lines
    when: ansible_os_family == "RedHat"

  - name: Dump DNF repo configuration
    ansible.builtin.command: dnf config-manager --dump
    register: dnf_repo_dump
    changed_when: false
    when: ansible_os_family == "RedHat"

  - name: Show repository dump
    ansible.builtin.debug:
      var: dnf_repo_dump.stdout_lines
    when: ansible_os_family == "RedHat"

  - name: Install liburing packages (not on RHEL 10)
    yum:
      name:
        - liburing
        - liburing-devel
      state: latest
      update_cache: yes

  - name: install packages specific to rhel 8 and 9
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      packages:
      - lcov
      - prename
    when: ansible_distribution_major_version == "8" or ansible_distribution_major_version == "9"

  - name: Install cpanm File::Rename
    become: true
    command: cpanm File::Rename
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"

  - name: Install required Perl modules
    become: true
    ansible.builtin.command: >
      cpanm --notest --quiet {{ item }}
    args:
      creates: "/usr/local/share/perl5/{{ item | replace('::', '/') }}.pm"
    loop:
      - CGI::Session
      - HTTP::Server::Simple::CGI

  - name: Debug 3
    command: rpm -qi systemtap-sdt-devel
    ignore_errors: true
    register: results

  - debug:
      var: results.stdout

  - name: Debug 4
    command: yum -v search systemtap-sdt-devel
    ignore_errors: true
    register: results

  - debug:
      var: results.stdout

  - name: Debug 5
    command: yum install -y systemtap-sdt-devel --allowerasing
    ignore_errors: true
    register: results

  - debug:
      var: results.stdout

  - name: Install perl Text-trim
    command: cpanm Text::Trim
    ignore_errors: true
    register: results

  - name: install perl modules for rhel 9
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      packages:
      - perl-FindBin
      - perl-Opcode
    when: ansible_distribution_major_version == "9"

  - name: LLVM Version
    command: llvm-config --version
    ignore_errors: true
    register: results

  - debug:
      var: results.stdout

  - name: CLANG Version
    command: clang --version
    ignore_errors: true
    register: results

  - name: Get ulimit on Rocky 8 ARM for postgres user
    become_user: postgres
    command: ulimit -a
    register: results
    when: ansible_distribution_major_version == "8" and ansible_architecture == 'aarch64'

  - debug: var=results.stdout_lines
    when: ansible_distribution_major_version == "8" and ansible_architecture == 'aarch64'

  - name: Modify memlock, both soft and hard, limit for the user postgres
    community.general.pam_limits:
      domain: postgres
      limit_type: '-'
      limit_item: memlock
      value: 128
      comment: 128kb memory lock for postgres
    when: ansible_distribution_major_version == "8" and ansible_architecture == 'aarch64'

  - debug: var=results.stdout_lines
    when: ansible_distribution_major_version == "8" and ansible_architecture == 'aarch64'

  - name: Get ulimit on Rocky 8 ARM for postgres user
    become_user: postgres
    command: ulimit -a
    register: results
    when: ansible_distribution_major_version == "8" and ansible_architecture == 'aarch64'

  - debug: var=results.stdout_lines
    when: ansible_distribution_major_version == "8" and ansible_architecture == 'aarch64'

  - name: Change ownership of /tmp/bao_env to postgres
    ansible.builtin.file:
      path: /tmp/bao_env
      owner: postgres
      group: wheel
      recurse: true
    become: true

  - name: Disable dnf module for RHEL8
    become: true
    command: dnf module disable postgresql -y
    when: ansible_distribution_major_version == "8"

  - name: install Percona Platform for PostgreSQL rpm packages for RHEL
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      postgres_version: "{{ major_version }}"
      packages:
      - percona-postgresql-client-common
      - percona-postgresql-common
      - percona-postgresql{{ postgres_version }}
      - percona-postgresql{{ postgres_version }}-contrib
      - percona-postgresql{{ postgres_version }}-devel
      - percona-postgresql{{ postgres_version }}-libs
      - percona-postgresql{{ postgres_version }}-plperl
      - percona-postgresql{{ postgres_version }}-plpython3
      - percona-postgresql{{ postgres_version }}-pltcl
      - percona-postgresql{{ postgres_version }}-server
      - percona-postgresql{{ postgres_version }}-test
      - percona-postgresql{{ postgres_version }}-llvmjit
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"
    when: ansible_distribution_major_version == "8"

  - name: install Percona Platform for PostgreSQL rpm packages for RHEL
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      postgres_version: "{{ major_version }}"
      packages:
      - percona-postgresql-client-common
      - percona-postgresql-common
      - percona-postgresql{{ postgres_version }}
      - percona-postgresql{{ postgres_version }}-contrib
      - percona-postgresql{{ postgres_version }}-devel
      - percona-postgresql{{ postgres_version }}-libs
      - percona-postgresql{{ postgres_version }}-plperl
      - percona-postgresql{{ postgres_version }}-plpython3
      - percona-postgresql{{ postgres_version }}-pltcl
      - percona-postgresql{{ postgres_version }}-server
      - percona-postgresql{{ postgres_version }}-test
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"
    when: ansible_distribution_major_version == "9" or ansible_distribution_major_version == "10"

  - name: Install Percona PostgreSQL development packages
    ansible.builtin.dnf:
      name: "{{ 'percona-postgresql-server-dev-all' if (pg_version_to_install is version('17.4', '<=')) else 'percona-postgresql-common-dev' }}"
      state: present
      update_cache: yes
    when: ansible_os_family == "RedHat"

  - name: Write Cluster.pm logging_collector patch to temp file
    # Must run AFTER percona-postgresql*-test is installed (which ships Cluster.pm).
    # The heredoc content is written via copy to avoid YAML block-scalar termination:
    # unindented content inside a shell | block is misread as end-of-scalar by YAML.
    become: true
    ansible.builtin.copy:
      dest: /tmp/cluster_pm_patch.pl
      mode: '0644'
      content: |

        # --- logging_collector_ansible_patch ---
        # Force logging_collector=off for every test cluster so that
        # wait_for_log() can read messages from the testwrap capture file.
        # The Percona ppg build-from-source enables logging_collector by default,
        # which redirects server logs away from the file that wait_for_log reads.
        {
            no warnings 'redefine';
            my $_orig_cluster_init = \&PostgreSQL::Test::Cluster::init;
            *PostgreSQL::Test::Cluster::init = sub {
                my ($self, %params) = @_;
                $self->$_orig_cluster_init(%params);
                $self->append_conf('postgresql.conf', "logging_collector = off\n");
                return $self;
            };
        }
    when: ansible_os_family == "RedHat"

  - name: Patch PostgreSQL TestCluster to force logging_collector=off in test clusters
    # The Percona PostgreSQL build-from-source has logging_collector=on as default.
    # PostgreSQL::Test::Cluster::wait_for_log() reads the testwrap capture file
    # (e.g. wal_archiving_replica_enc.log), but with logging_collector=on the server
    # redirects all output to pgdata/log/ after startup — the capture file stops at
    # 4 lines and wait_for_log() never sees "waiting for WAL to become available".
    # This causes wal_archiving.pl to BAIL_OUT after 300s on every RHEL variant.
    # PSP binary packages have logging_collector=off and pass correctly.
    # Fix: monkey-patch Cluster.pm to append logging_collector=off to postgresql.conf
    # for every test cluster created by init(), without touching pg_tde source.
    become: true
    ansible.builtin.shell: |
      CLUSTER_PM=$(find /usr/pgsql-18 /opt/pgsql -name "Cluster.pm" \
                        -path "*/PostgreSQL/Test/*" 2>/dev/null | head -1)
      if [ -z "$CLUSTER_PM" ]; then
        echo "Cluster.pm not found — skipping"
        exit 0
      fi
      if grep -q "logging_collector_ansible_patch" "$CLUSTER_PM"; then
        echo "Already patched"
        exit 0
      fi
      cat /tmp/cluster_pm_patch.pl >> "$CLUSTER_PM"
      echo "Cluster.pm patched: $CLUSTER_PM"
    args:
      executable: /bin/bash
    when: ansible_os_family == "RedHat"

  - name: Install pg_tde packages RHEL
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      postgres_version: "{{ major_version }}"
      packages:
      - percona-pg_tde{{ postgres_version }}
      - percona-pg_tde{{ postgres_version }}-devel
      - percona-pg_tde{{ postgres_version }}-debugsource
      - percona-pg_tde{{ postgres_version }}-debuginfo

  - name: Initialize Postgres RHEL
    become: true
    command: /usr/pgsql-{{ major_version }}/bin/postgresql-{{ major_version }}-setup initdb
    environment:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

  - name: Install pgaudit RHEL
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      postgres_version: "{{ major_version }}"
      packages:
      - percona-pgaudit{{ postgres_version }}
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  - name: Install set_user RHEL
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      postgres_version: "{{ major_version }}"
      packages:
      - percona-pgaudit{{ postgres_version }}_set_user
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  - name: Install pgrepack RHEL
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      postgres_version: "{{ major_version }}"
      packages:
      - percona-pg_repack{{ postgres_version }}
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  - name: Install percona-postgis RHEL
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      postgres_version: "{{ major_version }}"
      packages:
      - "{{postgis_rhel_package_name_prefix}}"
      - "{{postgis_rhel_package_name_prefix}}-client"
      - "{{postgis_rhel_package_name_prefix}}-client-debuginfo"
      - "{{postgis_rhel_package_name_prefix}}-debuginfo"
      - "{{postgis_rhel_package_name_prefix}}-devel"
      - "{{postgis_rhel_package_name_prefix}}-docs"
      - "{{postgis_rhel_package_name_prefix}}-gui"
      - "{{postgis_rhel_package_name_prefix}}-gui-debuginfo"
      - "{{postgis_rhel_package_name_prefix}}-llvmjit"
      - "{{postgis_rhel_package_name_prefix}}-utils"
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  - name: Install pg-stat-monitor RHEL RPM Package
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      packages:
        - percona-pg_stat_monitor{{ major_version }}
        - percona-pg_stat_monitor{{ major_version }}-debuginfo
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  - name: Add extensions to postgresql.conf for RHEL
    lineinfile:
      path: /var/lib/pgsql/{{ major_version }}/data/postgresql.conf
      line: shared_preload_libraries = 'pg_tde'

  - name: Start Postgres RHEL
    service:
      name: postgresql-{{ major_version }}
      state: started
      enabled: yes

  - name: Check if postgres processes are running
    command: ps aux
    register: ps_output

  - name: Show postgres processes
    debug:
      msg: "{{ ps_output.stdout_lines | select('search', 'postgres') | list }}"

  - name: List postgres socket files
    shell: ls -l /tmp/.s.PGSQL* || true
    register: socket_output

  - name: Show postgres socket files
    debug:
      var: socket_output.stdout_lines

  - name: Show PostgreSQL unix_socket_directories
    shell: |
      psql -d postgres -t -A -c "SHOW unix_socket_directories;"
    become: true
    become_user: postgres
    register: socket_dir

  - name: Print PostgreSQL socket directory
    debug:
      var: socket_dir.stdout

  - name: Set stack ulimit for a specific user
    become: true
    pam_limits:
      domain: postgres  # Replace with the target username
      limit_type: "-"         # Applies to both soft and hard limits
      limit_item: stack
      value: 102400            # Desired stack size in KB
    register: results

  - debug: var=results.stdout_lines

  - name: Allow postgres user to create core dumps
    community.general.pam_limits:
      domain: postgres
      limit_type: hard
      limit_item: core
      value: unlimited
    register: results
    when: ansible_distribution_major_version == "10"

  - debug: var=results.stdout_lines
    when: ansible_distribution_major_version == "10"

  - name: Allow postgres user to create core dumps (soft)
    community.general.pam_limits:
      domain: postgres
      limit_type: soft
      limit_item: core
      value: unlimited
    register: results
    when: ansible_distribution_major_version == "10"

  - debug: var=results.stdout_lines
    when: ansible_distribution_major_version == "10"

  - name: Get ulimit results
    become_user: postgres
    ansible.builtin.shell: ulimit -a
    register: results

  - debug: var=results.stdout_lines

  - name: Run psql show default_table_access_method
    shell: |
      psql -c "show default_table_access_method;"
    become_user: postgres
    args:
      executable: /bin/bash
    environment:
      PGHOST: "/run/postgresql, /tmp"
      PGPORT: "5432"
      LANG: "C.UTF-8"
    register: psql_result
    when: ansible_os_family == 'RedHat'

  - name: Show psql output
    debug:
      var: psql_result.stdout_lines

  - name: Show psql output
    debug:
      var: psql_result.stderr_lines
