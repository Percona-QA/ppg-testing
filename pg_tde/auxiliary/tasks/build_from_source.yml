# =================================================
# Clone,Build and install, Postgres/PSP with pg_tde
# =================================================
  - name: Clone Postgres/PSP sources
    ansible.builtin.git:
      repo: "{{ psp_repo }}"
      version: "{{ psp_branch }}"
      dest: /tmp/postgres
      track_submodules: true
    become: true
    become_user: postgres
    register: psp_clone_results

  - name: Debug git results
    debug:
      msg: "Cloned version: {{ psp_clone_results.after | default('N/A') }}"

  - name: Clone pg_tde sources
    git:
      repo: "{{ tde_repo }}"
      version: "{{ tde_branch }}"
      dest: /tmp/pg_tde
      track_submodules: true
    become: true
    become_user: postgres
    register: tde_clone_results

  - name: Debug git results
    debug:
      msg: "Cloned version: {{ tde_clone_results.after | default('N/A') }}"

  - name: Submodule update
    command : git submodule update --init --recursive
    args:
      chdir: /tmp/pg_tde
      executable: /bin/bash
    become_user: postgres
    when: not install_from_packages
    register: results

  - debug: var=results.stdout_lines

  - name: Fix shsplit Python 3.6 compatibility (text= added in 3.7; universal_newlines= is identical and works on 3.6+)
    ansible.builtin.replace:
      path: /tmp/pg_tde/shsplit
      regexp: 'text=True'
      replace: 'universal_newlines=True'

  - name: Configure Postgres/PSP from sources with liburing for supported OS.
    ansible.builtin.shell: |
      set -o pipefail
      ./configure --enable-debug --enable-cassert --enable-tap-tests --with-icu --prefix=/opt/pgsql --with-liburing \
        2>&1 | tee /tmp/psp-build.log
    args:
      chdir: /tmp/postgres
      executable: /bin/bash
    become: true
    become_user: postgres
    when:
      - (major_version | int) >= 18
      - io_method in ['io_uring']
    ignore_errors: true
    register: psp_configure_output

  - debug: var=psp_configure_output.stdout_lines
    when: psp_configure_output is defined

  - name: Configure Postgres/PSP from sources
    ansible.builtin.shell: |
      set -o pipefail
      ./configure --enable-debug --enable-cassert --enable-tap-tests --with-icu --prefix=/opt/pgsql \
        2>&1 | tee /tmp/psp-build.log
    args:
      chdir: /tmp/postgres
      executable: /bin/bash
    become_user: postgres
    when:
      - io_method not in ['io_uring']
    ignore_errors: true
    register: psp_configure_output

  - debug: var=psp_configure_output.stdout_lines
    when: psp_configure_output is defined

  - name: Run make install-world with parallel jobs
    ansible.builtin.shell: |
      set -o pipefail
      make install-world -j 2>&1 | tee -a /tmp/psp-build.log
    args:
      chdir: /tmp/postgres
      executable: /bin/bash
    become_user: postgres
    environment:
      TDE_MODE: "1"
    when: psp_configure_output is defined and psp_configure_output.rc | default(1) == 0
    ignore_errors: true
    register: psp_build_output

  - debug: var=psp_build_output.stdout_lines
    when: psp_build_output is defined

  - name: Run make install for Injection points, as this extension is not built by default
    ansible.builtin.command: make install -j -s -C src/test/modules/injection_points
    args:
      chdir: /tmp/postgres
      executable: /bin/bash
    become_user: postgres
    environment:
      TDE_MODE: "1"
    when:
      - (major_version | int) >= 17
      - psp_build_output is defined
      - psp_build_output.rc | default(1) == 0
    ignore_errors: true
    register: results

  - debug: var=results.stdout_lines

  - name: Copy pg_config to /usr/bin
    become: true
    command: sudo cp /opt/pgsql/bin/pg_config /usr/bin
    when: psp_build_output is defined and psp_build_output.rc | default(1) == 0

  - name: Build pg_tde
    become: true
    become_user: postgres
    ansible.builtin.shell: |
      set -o pipefail
      export LD_LIBRARY_PATH="/opt/pgsql/lib:${LD_LIBRARY_PATH:-}"
      rm -rf /tmp/pg_tde-build
      meson setup --buildtype=release -Dpg_config=/opt/pgsql/bin/pg_config -Dwerror=true /tmp/pg_tde-build 2>&1 | tee /tmp/tde-build.log
    args:
      chdir: /tmp/pg_tde
      executable: /bin/bash
    environment:
      PATH: "/opt/pgsql/bin:/opt/pgsql/lib:/usr/bin:/usr/local/bin:{{ ansible_env.PATH }}"
      LD_LIBRARY_PATH: "/opt/pgsql/lib"
      TDE_MODE: "1"
    when: psp_build_output is defined and psp_build_output.rc | default(1) == 0
    ignore_errors: true
    register: tde_build_output

  - debug: var=tde_build_output.stdout_lines
    when: tde_build_output is defined

  - name: Install pg_tde
    become: true
    ansible.builtin.shell: |
      set -o pipefail
      meson install -C /tmp/pg_tde-build 2>&1 | tee /tmp/tde-install.log
    args:
      executable: /bin/bash
    environment:
      PATH: "/opt/pgsql/bin:/opt/pgsql/lib:/usr/bin:/usr/local/bin:{{ ansible_env.PATH }}"
    when:
      - tde_build_output is defined
      - tde_build_output.rc | default(1) == 0
    ignore_errors: true
    register: tde_install_output

  - debug: var=tde_install_output.stdout_lines
    when: tde_install_output is defined
