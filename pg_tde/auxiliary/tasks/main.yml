---
  - name: Set Base Facts
    set_fact:
      major_version: "{{ lookup('env','VERSION') | regex_replace('ppg-(\\d+).*','\\1') }}"
      install_from_packages: "{{ lookup('env', 'INSTALL_FROM_PACKAGES') | default('false') | bool }}"
      full_version: "{{ lookup('env','VERSION') | regex_replace('ppg-','') }}"

      # Convert "true"/"false" strings to actual Booleans
      skip_testcase_enabled: "{{ lookup('env', 'SKIP_TESTCASE') | default('false') | bool }}"
      build_from_source: "{{ lookup('env', 'BUILD_FROM_SOURCE') | default('false') | bool }}"

      # Direct mappings
      io_method: "{{ lookup('env', 'IO_METHOD') | default('worker') }}"
      psp_repo: "{{ lookup('env', 'PSP_REPO') }}"
      psp_branch: "{{ lookup('env', 'PSP_BRANCH') }}"
      tde_repo: "{{ lookup('env', 'TDE_REPO') }}"
      tde_branch: "{{ lookup('env', 'TDE_BRANCH') }}"
      percona_qa_repo: "{{ lookup('env', 'PERCONA_QA_REPO') }}"
      percona_qa_branch: "{{ lookup('env', 'PERCONA_QA_BRANCH') }}"
      skip_testcase_list: "{{ lookup('env', 'TESTCASE_TO_SKIP') | default('') }}"
      # ... include other env lookups here ...
      go_version: "1.25.6"
      go_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}"
      artifact_filename: "tde-auxiliary-{{ lookup('env','VERSION') }}-{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}-{{ ansible_architecture }}-build{{ lookup('env','BUILD_NUMBER') }}.tar.gz"
      cacheable: true

  - name: End play on Ubuntu 26 if PostgreSQL version is not supported
    meta: end_host
    vars:
      ubuntu26_min_versions:
        '14': '14.23'
        '15': '15.18'
        '16': '16.14'
        '17': '17.10'
        '18': '18.4'
      pg_major: "{{ full_version | string | split('.') | first }}"
      min_ver: "{{ ubuntu26_min_versions[pg_major] | default('0.0') }}"
    when:
      - ansible_distribution == "Ubuntu"
      - ansible_distribution_major_version == "26"
      - min_ver != '0.0'
      - full_version | string is version(min_ver, '<', strict=True)

  - name: Set Dependent Facts
    set_fact:
      # Now that go_version is saved, we can use it here
      go_tarball: "go{{ go_version }}.linux-{{ go_arch }}"
      go_download_url: "https://go.dev/dl/go{{ go_version }}.linux-{{ go_arch }}.tar.gz"
      go_install_dir: "/usr/local"
      cacheable: true

  - name: Set PostgreSQL config path for Debian/Ubuntu
    set_fact:
      pg_conf: "/etc/postgresql/{{ major_version }}/main/postgresql.conf"
      pg_config_path: "/usr/lib/postgresql/{{ major_version }}/bin/pg_config"
      pg_bin_dir: "/usr/lib/postgresql/{{ major_version }}/bin"
      pg_lib_dir: "/usr/lib/postgresql/{{ major_version }}/lib"
      pg_install_dir: "/usr/lib/postgresql/{{ major_version }}"
    when: ansible_os_family == "Debian" and install_from_packages

  - name: Set PostgreSQL config path for RHEL/CentOS/Rocky
    set_fact:
      pg_conf: "/var/lib/pgsql/{{ major_version }}/data/postgresql.conf"
      pg_config_path: "/usr/pgsql-{{ major_version }}/bin/pg_config"
      pg_bin_dir: "/usr/pgsql-{{ major_version }}/bin"
      pg_lib_dir: "/usr/pgsql-{{ major_version }}/lib"
      pg_install_dir: "/usr/pgsql-{{ major_version }}"
    when: ansible_os_family == "RedHat" and install_from_packages

  - name: Set PostgreSQL config path for build from sources
    set_fact:
      pg_conf: "/opt/pgsql/data/postgresql.conf"
      pg_config_path: "/opt/pgsql/bin/pg_config"
      pg_bin_dir: "/opt/pgsql/bin"
      pg_lib_dir: "/opt/pgsql/lib"
      pg_install_dir: "/opt/pgsql"
    when: not install_from_packages

  - name: End play on RHEL 8 and Rocky 8 for pg-18>= and io_uring, as uring not supported
    meta: end_play
    when:
      - (major_version | int) >= 18
      - io_method in ['io_uring']
      - >
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Rocky' and ansible_facts['distribution_major_version'] | int == 8)
        or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'RedHat' and ansible_facts['distribution_major_version'] | int == 8)

  # On Debian 13 / Ubuntu 26 systemd mounts /tmp as a RAM-backed tmpfs (~16 GB,
  # half of RAM). The test framework runs in /tmp/pgtest and the suite needs
  # more than that on those distros, so /tmp fills (ENOSPC) and the host dies
  # before packaging — even though the 100 GB root disk is ~85% free. Redirect
  # /tmp onto the root disk (bind mount) where it is tmpfs, before the build or
  # tests write anything there. Only acts where /tmp is actually tmpfs.
  - name: Move /tmp off tmpfs onto the root disk where applicable
    become: true
    ansible.builtin.shell: |
      set -e
      if findmnt -no FSTYPE /tmp 2>/dev/null | grep -qx tmpfs; then
        mkdir -p /var/tmp/disktmp
        chmod 1777 /var/tmp/disktmp
        mount --bind /var/tmp/disktmp /tmp
        echo "REDIRECTED /tmp -> /var/tmp/disktmp (was tmpfs)"
      else
        echo "/tmp is not tmpfs; no change"
      fi
    register: tmp_redirect
    changed_when: "'REDIRECTED' in tmp_redirect.stdout"

  - name: Show /tmp redirect result
    ansible.builtin.debug:
      var: tmp_redirect.stdout

  - name: Configure repository
    ansible.builtin.include_tasks: ../../../../tasks/enable_repo.yml
    when: install_from_packages

  - name: Include Redhat tasks file
    include_tasks: 
      file: "redhat_tasks.yml"
    when: ansible_os_family == 'RedHat'

  - name: Include Debian tasks file 
    include_tasks: 
      file: "debian_tasks.yml"
    when: ansible_os_family == 'Debian'

  # Docker is required on all platforms — percona-qa scripts use it for KMIP
  # and other key provider services at test runtime.
  - name: Include Docker setup file
    include_tasks:
      file: "install_docker.yml"

  - name: Verify Docker daemon is responsive
    become: true
    command: docker info
    register: docker_info
    retries: 3
    delay: 5
    until: docker_info.rc == 0

  - name: Ensure at least 4 GB swap is configured
    become: true
    block:
      - name: Check if swap is already enabled
        ansible.builtin.command: swapon --noheadings --show=SIZE
        register: swap_status
        changed_when: false
        failed_when: false

      - name: Set fact for existing swap size in MB
        ansible.builtin.set_fact:
          swap_size_mb: >-
            {{ ((swap_status.stdout | regex_findall('\\d+') | map('int') | sum) / 1048576) | int }}

      - name: Create 4G swap file if not present or too small
        ansible.builtin.command: fallocate -l 4G /swapfile
        args:
          creates: /swapfile
        when: (swap_size_mb | int) < 3000

      - name: Secure swap file permissions
        ansible.builtin.file:
          path: /swapfile
          owner: root
          group: root
          mode: '0600'
        when: (swap_size_mb | int) < 3000

      - name: Format swap file
        ansible.builtin.command: mkswap /swapfile
        when: (swap_size_mb | int) < 3000

      - name: Enable swap
        ansible.builtin.command: swapon /swapfile
        when: (swap_size_mb | int) < 3000

      - name: Persist swap in /etc/fstab
        ansible.builtin.lineinfile:
          path: /etc/fstab
          line: '/swapfile none swap sw 0 0'
          state: present
        when: (swap_size_mb | int) < 3000

  - name: Set stack ulimit for a specific user
    become: true
    pam_limits:
      domain: postgres  # Replace with the target username
      limit_type: "-"         # Applies to both soft and hard limits
      limit_item: stack
      value: 102400            # Desired stack size in KB

  - name: Check if io_uring is disabled
    command: cat /proc/sys/kernel/io_uring_disabled
    register: uring_disabled
    ignore_errors: true
    when:
      - (major_version | int) >= 18
      - io_method in ['io_uring']
      - ansible_os_family == 'RedHat'

  - name: Enable io_uring if possible
    become: true
    sysctl:
      name: kernel.io_uring_disabled
      value: 0
      state: present
    when:
      - (major_version | int) >= 18
      - io_method in ['io_uring']
      - ansible_os_family == 'RedHat'
      - uring_disabled.stdout is defined
      - uring_disabled.stdout | int > 0

  - name: Ensure postgres user has unlimited core dump limit
    become: true
    community.general.pam_limits:
      domain: postgres
      limit_item: core
      limit_type: "{{ item }}"
      value: unlimited
    loop:
      - soft
      - hard

  - name: Install OS-specific prerequisites
    package:
      name:
        - curl
        - tar
      state: present

  - name: Check if Go is already installed
    shell: "/usr/local/go/bin/go version | grep -q 'go{{ go_version }}'"
    register: go_exists
    ignore_errors: true
    changed_when: false

  - name: Installation Block
    when: go_exists.rc != 0
    block:
      - name: Download Go binary
        get_url:
          url: "{{ go_download_url }}"
          dest: "/tmp/{{ go_tarball }}"
          mode: '0644'

      - name: Remove old Go installation
        file:
          path: "{{ go_install_dir }}/go"
          state: absent

      - name: Extract Go tarball
        unarchive:
          src: "/tmp/{{ go_tarball }}"
          dest: "{{ go_install_dir }}"
          remote_src: yes

  - name: Add Go to system-wide PATH
    copy:
      dest: /etc/profile.d/golang.sh
      content: |
        export PATH=$PATH:/usr/local/go/bin
        export GOPATH=$HOME/go
        export PATH=$PATH:$GOPATH/bin
      mode: '0644'

  - name: Clean up tarball
    file:
      path: "/tmp/{{ go_tarball }}"
      state: absent

  # =================================================
  # Clone,Build and install, Postgres/PSP with pg_tde
  # =================================================

  - name: Build from sources, PSP and TDE
    include_tasks:
      file: "build_from_source.yml"
    when: not install_from_packages

  # =================================================
  # Install from packages, both Postgres/PSP and pg_tde
  # =================================================

  - name: Install on RHEL
    include_tasks:
      file: "install_from_packages_rhel.yml"
    when: install_from_packages and ansible_os_family == 'RedHat'

  - name: Install on Debian
    include_tasks:
      file: "install_from_packages_deb.yml"
    when: install_from_packages and ansible_os_family == 'Debian'

  # =============================
  # Clone Percona-qa sources
  # =============================

  - name: Clone Percona-qa sources
    git:
      repo: "{{ percona_qa_repo }}"
      version: "{{ percona_qa_branch }}"
      dest: /tmp/percona-qa
    become: true          # Required for become_user to work
    become_user: postgres
    register: clone_results

  - name: Debug git results
    debug:
      msg: "Cloned version: {{ clone_results.after | default('N/A') }}"

  # =============================
  # Remove testcases to be skipped
  # =============================
  #- name: Remove skipped test cases
  #  ansible.builtin.file:
  #    path: "/tmp/percona-qa/postgresql/automation/tests/{{ item | trim }}"
  #    state: absent
  #  # split(',') handles single items (no comma) and lists (with comma) identically
  #  loop: "{{ skip_testcase_list.split(',') }}"
  #  when:
  #    - skip_testcase_enabled                 # Already a boolean from your variable definition
  #    - item | trim | length > 0              # Safety check for empty list items
  #  become: true

  # =============================
  # Run Percona-qa sources tests
  # =============================
  - name: Run check tde tests
    become: true
    become_user: postgres
    shell: >-
      ./test_runner.sh
      --server_build_path {{ pg_install_dir }}
      {% if skip_testcase_enabled and skip_testcase_list | length > 0 %}--skip_test {{ skip_testcase_list }}{% endif %}
      --io_method {{ io_method }}
    args:
      executable: /bin/bash
      chdir: "/tmp/percona-qa/postgresql/automation/wrapper"
    environment:
      # Prepending custom paths to the existing PATH
      PATH: "{{ pg_bin_dir }}:{{ pg_lib_dir }}:/usr/local/go/bin:{{ ansible_env.PATH | default('/usr/local/bin:/usr/bin:/bin') }}"
      LD_LIBRARY_PATH: "{{ pg_lib_dir }}"
      PG_TEST_PORT_DIR: "/tmp/pg_tde_port"
      INSTALL_DIR: "{{ pg_install_dir }}"
      PGCTLTIMEOUT: "120"
      PG_TEST_TIMEOUT_DEFAULT: "300"
    ignore_errors: true
    register: regression

  # Disk-usage report printed to the Jenkins console (survives a later host death
  # at "Save test runner output"). Some hosts (debian13-x86, uresolute-x86) fill
  # the volume during the run for an as-yet-unknown reason; this shows what ate it.
  - name: Capture disk usage after test run
    become: true
    ansible.builtin.shell: |
      set +e
      echo "===== df -h ====="
      df -h
      echo "===== du -sh /tmp/pgtest top-level ====="
      du -sh /tmp/pgtest 2>/dev/null
      echo "===== du -sh /tmp/pgtest/* ====="
      du -sh /tmp/pgtest/* 2>/dev/null | sort -rh | head -20
      echo "===== du -sh /tmp/pgtest/test_logs/* (per-test logs) ====="
      du -sh /tmp/pgtest/test_logs/* 2>/dev/null | sort -rh | head -20
      echo "===== largest files under /tmp/pgtest ====="
      find /tmp/pgtest -type f -size +100M -exec du -h {} \; 2>/dev/null | sort -rh | head -20
      echo "===== core dumps ====="
      find / -maxdepth 4 -name "core*" -type f 2>/dev/null -exec du -h {} \; | head -20
      ls -1 /proc/sys/kernel/core_pattern 2>/dev/null && cat /proc/sys/kernel/core_pattern 2>/dev/null
    register: disk_report
    changed_when: false
    ignore_errors: true

  - name: Show disk usage report
    ansible.builtin.debug:
      var: disk_report.stdout_lines

  - name: Extract failed log paths
    set_fact:
      failed_log_paths: "{{ regression.stdout | regex_findall('❌ FAIL:.*\\n\\s+Log:\\s+(.*)') }}"

  - name: Read last 50 lines of failed logs
    shell: "tail -n 50 {{ item }}"
    loop: "{{ failed_log_paths }}"
    register: failed_log_outputs
    become: true
    become_user: postgres
    ignore_errors: true
    when: failed_log_paths | length > 0

  - name: Display failed test logs
    debug:
      msg:
        - "--------------------------------------------------"
        - "TEST LOG: {{ item.item }} ❌ FAIL"
        - "--------------------------------------------------"
        - "{{ item.stdout_lines }}"
    loop: "{{ failed_log_outputs.results }}"
    # Only run if there are actual results in the list
    when: failed_log_outputs.results | default([]) | length > 0

  - name: Show stderr if test fails
    debug:
      var: regression.stderr_lines
    when:
      - failed_log_outputs.results | default([]) | length > 0

  - name: Save test runner output to file
    copy:
      content: "{{ regression.stdout | default('') }}\n--- STDERR ---\n{{ regression.stderr | default('') }}"
      dest: /tmp/tde-test-runner-output.log
    become: true
    when: regression is defined

  - name: Package tde auxiliary test artifacts
    shell: |
      set -uo pipefail
      ARTIFACT_BASENAME="{{ artifact_filename | replace('.tar.gz', '') }}"
      ARTIFACT_DIR="/tmp/$ARTIFACT_BASENAME"
      rm -rf "$ARTIFACT_DIR"
      mkdir -p "$ARTIFACT_DIR"

      # The test runner summary is always included (tiny, ~14 KB).
      cp /tmp/tde-test-runner-output.log "$ARTIFACT_DIR/" 2>/dev/null || true

      # Did any test fail? failed_tests/ has a snapshot per failure, and the
      # runner summary prints "❌ FAIL:" lines.
      if find /tmp/pgtest/failed_tests -mindepth 1 -maxdepth 1 -type d 2>/dev/null | grep -q . \
         || grep -q "❌ FAIL:" /tmp/tde-test-runner-output.log 2>/dev/null; then
        TESTS_FAILED=1
      else
        TESTS_FAILED=0
      fi

      if [ "$TESTS_FAILED" -eq 0 ]; then
        # All tests passed — ship the runner summary plus the server (PSP) and
        # TDE build/install logs only. Keeps the Jenkins artifact upload small
        # while preserving build provenance; full per-test/server logs add no
        # value when everything passed.
        echo "All tests passed — artifact contains test runner summary + build logs only."
        cp /tmp/psp-build.log    "$ARTIFACT_DIR/" 2>/dev/null || true
        cp /tmp/tde-build.log    "$ARTIFACT_DIR/" 2>/dev/null || true
        cp /tmp/tde-install.log  "$ARTIFACT_DIR/" 2>/dev/null || true
      else
        # Failure — collect the full debug bundle.
        mkdir -p "$ARTIFACT_DIR/logs"
        mkdir -p "$ARTIFACT_DIR/failed_tests"

        # -----------------------------------------------------
        # Top-level: build logs
        # -----------------------------------------------------
        cp /tmp/pgtest/initdb.log           "$ARTIFACT_DIR/" 2>/dev/null || true
        cp /tmp/psp-build.log               "$ARTIFACT_DIR/" 2>/dev/null || true
        cp /tmp/tde-build.log               "$ARTIFACT_DIR/" 2>/dev/null || true
        cp /tmp/tde-install.log             "$ARTIFACT_DIR/" 2>/dev/null || true
        # Vault server log sits at test_logs/ top level (not in a per-test subdir).
        # Note: percona-qa now snapshots per-test KMS logs into each logs/<test>/
        # dir; this end-of-run copy keeps the last-run vault.log as a fallback.
        cp /tmp/pgtest/test_logs/vault.log  "$ARTIFACT_DIR/" 2>/dev/null || true
        # bao_server.log is written inside the openbao build dir under RUN_DIR
        find /tmp/pgtest -maxdepth 2 -name "bao_server.log" -exec cp {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
        # Background rotation/load helper logs written to RUN_DIR top level
        # (rotate_wal/rotate_table/rotate_master_key/run_load/sysbench/workload/...)
        find /tmp/pgtest -maxdepth 1 -name "*.log" -exec cp {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
        cp /tmp/sysbench_run.log            "$ARTIFACT_DIR/" 2>/dev/null || true
        # KMIP runs as a Docker container — grab its logs
        docker logs kmip > "$ARTIFACT_DIR/kmip-container.log" 2>&1 || true

        # -----------------------------------------------------
        # logs/: per-test subdirectories created by test_runner
        # -----------------------------------------------------
        find /tmp/pgtest/test_logs -mindepth 1 -maxdepth 1 -type d 2>/dev/null \
          -exec cp -r {} "$ARTIFACT_DIR/logs/" \; || true
        # System PostgreSQL service log: RHEL (/var/lib/pgsql)
        find /var/lib/pgsql -name "*.log" -type f 2>/dev/null \
          -exec cp {} "$ARTIFACT_DIR/logs/" \; || true
        # System PostgreSQL service log: Debian (/var/log/postgresql)
        find /var/log/postgresql -name "*.log" -type f 2>/dev/null \
          -exec cp {} "$ARTIFACT_DIR/logs/" \; || true
        # PostgreSQL server log when built from source (/opt/pgsql/data)
        find /opt/pgsql/data -name "*.log" -type f 2>/dev/null \
          -exec cp {} "$ARTIFACT_DIR/logs/" \; || true

        # -----------------------------------------------------
        # failed_tests/: PGDATA snapshots saved by test_runner
        # -----------------------------------------------------
        find /tmp/pgtest/failed_tests -mindepth 1 -maxdepth 1 -type d 2>/dev/null | while read d; do
          cp -r "$d" "$ARTIFACT_DIR/failed_tests/" 2>/dev/null || true
        done
      fi

      tar -czf "/tmp/{{ artifact_filename }}" -C /tmp "$ARTIFACT_BASENAME"
    args:
      executable: /bin/bash
    become: true
    ignore_errors: true

  - name: Fetch tde auxiliary test artifacts to controller
    fetch:
      src: "/tmp/{{ artifact_filename }}"
      dest: "{{ playbook_dir }}/../artifacts/"
      fail_on_missing: false

  - name: Fail the playbook if tde tests failed
    fail:
      msg: "TDE auxiliary tests failed"
    when:
      - failed_log_outputs.results | default([]) | length > 0
