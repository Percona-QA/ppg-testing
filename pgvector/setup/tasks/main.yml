---
  - name: Set Facts
    set_fact:
      major_version: "{{ lookup('env', 'VERSION').split('.')[0].split('-')[1] }}"
      cacheable: true

  - name: Configure repository
    include_tasks: ../../../../tasks/enable_repo.yml

  - name: Install build dependencies on Debian
    apt:
      name: "{{ packages }}"
      update_cache: yes
      state: latest
    vars:
      packages:
        - libreadline6-dev
        - systemtap-sdt-dev
        - zlib1g-dev
        - libssl-dev
        - libpam0g-dev
        - python3-dev
        - bison
        - flex
        - libipc-run-perl
        - wget
        - libtext-trim-perl
        - gnupg
        - tzdata
        - locales
        - lsb-release
        - apt-utils
        - make
        - gcc
        - gnupg2
        - curl
        - libz-dev
        - liblz4-dev
        - libreadline6-dev

  - name: install Percona Platform for PostgreSQL deb packages
    apt:
      name: "{{ packages }}"
      update_cache: yes
      state: latest
    vars:
      postgres_version: "{{ major_version }}"
      packages:
      - percona-postgresql
      - percona-postgresql-{{ postgres_version }}
      - percona-postgresql-all
      - percona-postgresql-client
      - percona-postgresql-client-{{ postgres_version }}
      - percona-postgresql-common
      - percona-postgresql-contrib
      - percona-postgresql-doc
      - percona-postgresql-doc-{{ postgres_version }}
      - percona-postgresql-plperl-{{ postgres_version }}
      - percona-postgresql-plpython3-{{ postgres_version }}
      - percona-postgresql-pltcl-{{ postgres_version }}
      - percona-postgresql-server-dev-{{ postgres_version }}
      - percona-postgresql-server-dev-all
      - percona-postgresql-{{ postgres_version }}-dbgsym
      - percona-postgresql-client-{{ postgres_version }}-dbgsym
      - percona-postgresql-plperl-{{ postgres_version }}-dbgsym
      - percona-postgresql-plpython3-{{ postgres_version }}-dbgsym
      - percona-postgresql-pltcl-{{ postgres_version }}-dbgsym
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  - name: Install pgaudit Debian
    apt:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      postgres_version: "{{ major_version }}"
      packages:
        - percona-postgresql-{{ postgres_version }}-pgaudit
        - percona-postgresql-{{ postgres_version }}-pgaudit-dbgsym
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  - name: Install percona-pgaudit{{ postgres_version }}_set_user Debian
    apt:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      postgres_version: "{{ major_version }}"
      packages:
        - percona-pgaudit{{ postgres_version }}-set-user
        - percona-pgaudit{{ postgres_version }}-set-user-dbgsym
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  - name: Install pgrepack Debian
    apt:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      postgres_version: "{{ major_version }}"
      packages:
        - percona-postgresql-{{ postgres_version }}-repack
        - percona-postgresql-{{ postgres_version }}-repack-dbgsym
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  - name: Install percona-postgis Debian
    apt:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      postgres_version: "{{ major_version }}"
      packages:
        - percona-postgresql-{{ postgres_version }}-postgis-3
        - percona-postgresql-{{ postgres_version }}-postgis-3-scripts
        - percona-postgresql-postgis-scripts
        - percona-postgresql-postgis
        - percona-postgis
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  - name: Clone pgvector sources
    git:
      repo: "{{ repo }}"
      version: "{{ version }}"
      dest: /tmp/pgvector
    vars:
      repo: "{{ lookup('env', 'COMPONENT_REPO') }}"
      version: "{{ lookup('env', 'COMPONENT_VERSION') }}"
    become_user: postgres

  - name: Build pgvector from sources
    make:
      chdir: "/tmp/pgvector"
      params:
        USE_PGXS: 1

  - name: Install pgvector Debian/Ubuntu Package
    apt:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      packages:
        - percona-postgresql-{{ major_version }}-pgvector

  - name: Install pg-stat-monitor Debian/Ubuntu Package
    apt:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      packages:
        - percona-pg-stat-monitor{{ major_version }}
        - percona-pg-stat-monitor{{ major_version }}-dbgsym

  - name: Add extensions to postgresql.conf for Debian
    lineinfile:
      path: /etc/postgresql/{{ major_version }}/main/postgresql.conf
      line: shared_preload_libraries = 'pg_stat_monitor'

  - name: Stop postgresql service for Debian based
    service:
      name: postgresql
      state: stopped

  - name: Start postgresql service for Debian based
    service:
      name: postgresql
      state: started
      enabled: true

  - debug:
      var: results.stdout

  - name: Test pgvector regression
    make:
      target: installcheck
      chdir: "/tmp/pgvector"
      params:
        USE_PGXS: 1
    become_user: postgres
    ignore_errors: true
    register: installcheck

  - debug: var=installcheck.stdout_lines

  - name: Test pgvector Tap tests
    make:
      target: prove_installcheck
      chdir: "/tmp/pgvector"
      params:
        USE_PGXS: 1
    become_user: postgres
    ignore_errors: true
    register: prove_installcheck

  - debug: var=prove_installcheck.stdout_lines

  - name: Show regression.diffs if installcheck or prove_installcheck failed
    shell: cat /tmp/pgvector/regression.diffs
    register: diffs_output
    when: >
      (installcheck is defined and installcheck.rc != 0) or
      (prove_installcheck is defined and prove_installcheck.rc != 0)
    ignore_errors: true

  - debug:
      msg: "{{ diffs_output.stdout_lines }}"
    when:
      - diffs_output is defined
      - diffs_output.stdout is defined
      - diffs_output.stdout | length > 0

  - name: Set pgvector artifact filename
    set_fact:
      artifact_filename: "pgvector-{{ lookup('env','VERSION') }}-{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}-{{ ansible_architecture }}-build{{ lookup('env','BUILD_NUMBER') }}.tar.gz"
    when: >
      (installcheck is defined and installcheck.rc != 0) or
      (prove_installcheck is defined and prove_installcheck.rc != 0)

  - name: Package and fetch pgvector failure artifacts to controller
    shell: |
      set -uo pipefail
      ARTIFACT_BASENAME="{{ artifact_filename | default('') | replace('.tar.gz', '') }}"
      ARTIFACT_DIR="/tmp/$ARTIFACT_BASENAME"
      rm -rf "$ARTIFACT_DIR"
      mkdir -p "$ARTIFACT_DIR"
      find /tmp/pgvector -name "regression.diffs" -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
      find /tmp/pgvector -name "regression.out" -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
      find /tmp/pgvector -type d -name "tmp_check" -exec cp -r {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
      find /var/log/postgresql -name "*.log" -type f -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
      tar -czf "/tmp/{{ artifact_filename | default('pgvector-artifacts.tar.gz') }}" -C /tmp "$ARTIFACT_BASENAME"
    args:
      executable: /bin/bash
    when: >
      (installcheck is defined and installcheck.rc != 0) or
      (prove_installcheck is defined and prove_installcheck.rc != 0)
    ignore_errors: true
    become: true

  - name: Fetch pgvector failure artifacts to controller
    fetch:
      src: "/tmp/{{ artifact_filename }}"
      dest: "{{ playbook_dir }}/../artifacts/"
      fail_on_missing: false
    when: >
      (installcheck is defined and installcheck.rc != 0) or
      (prove_installcheck is defined and prove_installcheck.rc != 0)
    become: true

  - name: Fail the playbook if installcheck failed
    fail:
      msg: "pgvector installcheck failed with return code {{ installcheck.rc }}"
    when:
      - installcheck is defined
      - installcheck.rc != 0

  - name: Fail the playbook if prove_installcheck failed
    fail:
      msg: "pgvector prove_installcheck failed with return code {{ prove_installcheck.rc }}"
    when:
      - prove_installcheck is defined
      - prove_installcheck.rc != 0
