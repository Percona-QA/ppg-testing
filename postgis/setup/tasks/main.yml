---
  - name: Set Facts
    set_fact:
      major_version: "{{ lookup('env', 'VERSION').split('.')[0].split('-')[1] }}"
      cacheable: true

  - name: Setting facts so that they will be persisted in the fact cache
    ansible.builtin.set_fact:
      postgis_rhel_package_name_prefix: "percona-postgis35_{{ major_version }}"

  - name: Configure repository
    include_tasks: ../../../../tasks/enable_repo.yml

  # - name: setup epel release
  #   yum:
  #     name: epel-release
  #     update_cache: yes
  #     state: present
  #   when: ansible_os_family == "RedHat"

  # - name: Enable crb on rocky linux 9
  #   become: true
  #   command: dnf config-manager --set-enabled crb

  - name: install Percona Platform for PostgreSQL rpm packages
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      packages:
      - percona-postgresql-client-common
      - percona-postgresql-common
      - percona-postgresql{{ major_version }}
      - percona-postgresql{{ major_version }}-contrib
      - percona-postgresql{{ major_version }}-libs
      - percona-postgresql{{ major_version }}-server
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  - name: install Percona Platform for PostGis rpm packages
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      packages:
      - "{{postgis_rhel_package_name_prefix}}"
      - "{{postgis_rhel_package_name_prefix}}-client"
      - "{{postgis_rhel_package_name_prefix}}-client-debuginfo"
      - "{{postgis_rhel_package_name_prefix}}-debuginfo"
      - "{{postgis_rhel_package_name_prefix}}-devel"
      - "{{postgis_rhel_package_name_prefix}}-docs"
      - "{{postgis_rhel_package_name_prefix}}-gui"
      - "{{postgis_rhel_package_name_prefix}}-gui-debuginfo"
      - "{{postgis_rhel_package_name_prefix}}-llvmjit"
      - "{{postgis_rhel_package_name_prefix}}-utils"

  - name: Initialize Postgres RHEL
    become: true
    command: /usr/pgsql-{{ major_version }}/bin/postgresql-{{ major_version }}-setup initdb
    environment:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

  - name: Start Postgres RHEL
    service:
      name: postgresql-{{ major_version }}
      state: started
      enabled: yes

  - name: Select available extensions
    become_user: postgres
    command: psql -c "SELECT name, default_version,installed_version FROM pg_available_extensions WHERE name LIKE 'postgis%' or name LIKE 'address%';"
    register: results

  - debug:
      var: results.stdout_lines

  - name: CREATE EXTENSION postgis
    become_user: postgres
    command: psql -c "CREATE EXTENSION postgis;"
    register: results

  - debug:
      var: results.stdout_lines

  - name: CREATE EXTENSION postgis_raster
    become_user: postgres
    command: psql -c "CREATE EXTENSION postgis_raster;"
    register: results

  - debug:
      var: results.stdout_lines

  - name: CREATE EXTENSION postgis_sfcgal
    become_user: postgres
    command: psql -c "CREATE EXTENSION postgis_sfcgal;"
    register: results

  - debug:
      var: results.stdout_lines

  - name: CREATE EXTENSION fuzzystrmatch
    become_user: postgres
    command: psql -c "CREATE EXTENSION fuzzystrmatch; "
    register: results

  - debug:
      var: results.stdout_lines

  - name: CREATE EXTENSION address_standardizer
    become_user: postgres
    command: psql -c "CREATE EXTENSION address_standardizer;"
    register: results

  - debug:
      var: results.stdout_lines

  - name: CREATE EXTENSION address_standardizer_data_us
    become_user: postgres
    command: psql -c "CREATE EXTENSION address_standardizer_data_us;"
    register: results

  - debug:
      var: results.stdout_lines

  - name: CREATE EXTENSION postgis_tiger_geocoder
    become_user: postgres
    command: psql -c "CREATE EXTENSION postgis_tiger_geocoder;"
    register: results

  - debug:
      var: results.stdout_lines

  - name: CREATE EXTENSION postgis_topology
    become_user: postgres
    command: psql -c "CREATE EXTENSION postgis_topology;"
    register: results

  - debug:
      var: results.stdout_lines

  - name: Display ppg version
    become_user: postgres
    shell: psql -c "select version()"
    register: results

  - debug:
        var: results.stdout_lines

  - name: Select available extensions
    become_user: postgres
    command: psql -c "SELECT name, default_version,installed_version FROM pg_available_extensions WHERE name LIKE 'postgis%' or name LIKE 'address%';"
    register: results

  - debug:
      var: results.stdout_lines

  - name: Select available extensions
    become_user: postgres
    command: psql -c "SELECT PostGIS_Full_Version();"
    register: results

  - debug:
      var: results.stdout_lines

  - name: Assert PostGIS_Full_Version returned output
    assert:
      that:
        - results.rc == 0
        - results.stdout | trim | length > 0
      fail_msg: "PostGIS_Full_Version() returned no output"

  # =============================
  # Functional regression checks
  #
  # Everything above only proves the extensions load (CREATE EXTENSION
  # succeeding). None of it proves the spatial functions actually compute
  # correct results. The checks below exercise one core function per
  # installed extension against a known expected answer.
  # =============================

  - name: ST_Distance on a 3-4-5 triangle (postgis core)
    become_user: postgres
    command: >
      psql -tAc "SELECT ST_Distance(ST_GeomFromText('POINT(0 0)'), ST_GeomFromText('POINT(3 4)'));"
    register: st_distance_result

  - name: Assert ST_Distance computed the correct value
    assert:
      that:
        - st_distance_result.stdout | trim | float == 5.0
      fail_msg: "ST_Distance((0,0),(3,4)) expected 5, got: {{ st_distance_result.stdout }}"

  - name: ST_Contains for a point inside a square (postgis core)
    become_user: postgres
    command: >
      psql -tAc "SELECT ST_Contains(ST_GeomFromText('POLYGON((0 0,0 10,10 10,10 0,0 0))'), ST_GeomFromText('POINT(5 5)'));"
    register: st_contains_result

  - name: Assert ST_Contains reported true
    assert:
      that:
        - st_contains_result.stdout | trim == 't'
      fail_msg: "ST_Contains expected true for a point inside the polygon, got: {{ st_contains_result.stdout }}"

  - name: ST_IsValid on a well-formed polygon (postgis core)
    become_user: postgres
    command: >
      psql -tAc "SELECT ST_IsValid(ST_GeomFromText('POLYGON((0 0,0 10,10 10,10 0,0 0))'));"
    register: st_isvalid_result

  - name: Assert ST_IsValid reported true
    assert:
      that:
        - st_isvalid_result.stdout | trim == 't'
      fail_msg: "ST_IsValid expected true for a well-formed polygon, got: {{ st_isvalid_result.stdout }}"

  - name: ST_Width on a freshly created raster (postgis_raster)
    become_user: postgres
    command: >
      psql -tAc "SELECT ST_Width(ST_MakeEmptyRaster(10, 20, 0, 0, 1));"
    register: st_width_result

  - name: Assert postgis_raster reported the correct raster width
    assert:
      that:
        - st_width_result.stdout | trim | int == 10
      fail_msg: "ST_Width(ST_MakeEmptyRaster(10, 20, ...)) expected 10, got: {{ st_width_result.stdout }}"

  - name: levenshtein distance between two known strings (fuzzystrmatch)
    become_user: postgres
    command: >
      psql -tAc "SELECT levenshtein('GUMBO', 'GAMBOL');"
    register: levenshtein_result

  - name: Assert levenshtein computed the correct edit distance
    assert:
      that:
        - levenshtein_result.stdout | trim | int == 2
      fail_msg: "levenshtein('GUMBO','GAMBOL') expected 2, got: {{ levenshtein_result.stdout }}"

  - name: parse_address on a known US address (address_standardizer)
    become_user: postgres
    command: >
      psql -tAc "SELECT house_num FROM parse_address('1 Devonshire Place PH301, Boston, MA 02109');"
    register: parse_address_result

  - name: Assert parse_address extracted the house number
    assert:
      that:
        - parse_address_result.stdout | trim == '1'
      fail_msg: "parse_address house_num expected '1', got: {{ parse_address_result.stdout }}"

  - name: CreateTopology returns a new topology id (postgis_topology)
    become_user: postgres
    command: >
      psql -tAc "SELECT topology.CreateTopology('ppg_test_topo', 4326);"
    register: create_topology_result

  - name: Assert CreateTopology returned a numeric topology id
    assert:
      that:
        - create_topology_result.stdout | trim | int > 0
      fail_msg: "topology.CreateTopology did not return a numeric topology id: {{ create_topology_result.stdout }}"

  - name: normalize_address runs against the tiger_geocoder lookup tables (postgis_tiger_geocoder)
    become_user: postgres
    command: >
      psql -tAc "SELECT (na).address FROM normalize_address('1 Devonshire Place, Boston, MA 02109') AS na;"
    register: normalize_address_result

  - name: Assert normalize_address returned a parsed street number
    assert:
      that:
        - normalize_address_result.stdout | trim | length > 0
      fail_msg: "normalize_address returned no output: {{ normalize_address_result.stdout }}"
