---
  - name: Set Facts
    set_fact:
      major_version: "{{ lookup('env', 'VERSION').split('.')[0].split('-')[1] }}"
      cacheable: true

  - name: Setting facts so that they will be persisted in the fact cache
    ansible.builtin.set_fact:
      postgis_rhel_package_name_prefix: "percona-postgis35_{{ major_version }}"

  - name: Configure repository
    include_tasks: ../../../../tasks/enable_repo.yml

  - name: install Percona Platform for PostgreSQL rpm packages
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      packages:
      - percona-postgresql-client-common
      - percona-postgresql-common
      - percona-postgresql{{ major_version }}
      - percona-postgresql{{ major_version }}-contrib
      - percona-postgresql{{ major_version }}-libs
      - percona-postgresql{{ major_version }}-server
      - percona-postgresql{{ major_version }}-devel

    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  - name: install Percona Platform for PostGis rpm packages
    yum:
      name: "{{ packages }}"
      state: latest
      update_cache: yes
    vars:
      packages:
      - "{{postgis_rhel_package_name_prefix}}"
      - "{{postgis_rhel_package_name_prefix}}-client"
      - "{{postgis_rhel_package_name_prefix}}-client-debuginfo"
      - "{{postgis_rhel_package_name_prefix}}-debuginfo"
      - "{{postgis_rhel_package_name_prefix}}-devel"
      - "{{postgis_rhel_package_name_prefix}}-docs"
      - "{{postgis_rhel_package_name_prefix}}-gui"
      - "{{postgis_rhel_package_name_prefix}}-gui-debuginfo"
      - "{{postgis_rhel_package_name_prefix}}-llvmjit"
      - "{{postgis_rhel_package_name_prefix}}-utils"

  - name: Initialize Postgres RHEL
    become: true
    command: /usr/pgsql-{{ major_version }}/bin/postgresql-{{ major_version }}-setup initdb
    environment:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

  - name: Start Postgres RHEL
    service:
      name: postgresql-{{ major_version }}
      state: started
      enabled: yes

  - name: CREATE EXTENSION postgis/postgis_raster/postgis_sfcgal/fuzzystrmatch/address_standardizer(_data_us)/postgis_tiger_geocoder/postgis_topology
    become_user: postgres
    command: psql -c "CREATE EXTENSION {{ item }};"
    loop:
      - postgis
      - postgis_raster
      - postgis_sfcgal
      - fuzzystrmatch
      - address_standardizer
      - address_standardizer_data_us
      - postgis_tiger_geocoder
      - postgis_topology

  # postgis_raster ships with GDAL output drivers disabled by default
  # (postgis.gdal_enabled_drivers boots to "DISABLE_ALL" - a security
  # hardening default.
  - name: Enable GDAL raster output drivers (disabled by default for security)
    become_user: postgres
    command: psql -c "ALTER DATABASE postgres SET \"postgis.gdal_enabled_drivers\" = 'ENABLE_ALL';"

  # PostGIS's own upstream regression suite, run via `make installcheck`
  # against the already-installed Percona package (same principle as
  # pg_audit/pg_repack/wal2json/pgvector: build from source only to get the
  # regress harness's helper binaries, never `make install`, so installcheck
  # validates the shipped package's SQL/library files, not a from-source
  # build).

  - name: Record the shipped package's actual linked library versions (ground truth for comparison below)
    become_user: postgres
    command: psql -tAc "SELECT PostGIS_Full_Version();"
    register: shipped_postgis_full_version

  - debug:
      msg: "Shipped percona-postgis35_{{ major_version }} reports: {{ shipped_postgis_full_version.stdout }}"

  - name: Install PostGIS build dependencies, version-matched to what percona-postgis35 actually depends on
    yum:
      name: "{{ packages }}"
      state: present
      update_cache: yes
    vars:
      packages:
        - autoconf
        - automake
        - libtool
        - pkgconfig
        - make
        - gcc
        - gcc-c++
        - git
        - perl
        - bison
        - flex
        # Version-matched to percona-postgis35_18's real declared
        # dependencies (gdal311-libs >= 3.11.0, geos311 >= 3.11.2,
        # proj95 >= 9.5.1) - from Percona's own repo, not EPEL/base RHEL.
        - gdal311
        - gdal311-devel
        - geos311
        - geos311-devel
        - proj95
        - proj95-devel
        - SFCGAL
        - SFCGAL-devel
        - json-c-devel
        - protobuf-c-devel
        - libxml2-devel
        - sqlite-devel
        - libcurl-devel
        - libtiff-devel
        - pcre2-devel

  # Same fix as pgaudit13_set_user/setup: install gcc-toolset-14 and source
  # its enable script before configure/build/installcheck.
  - name: Install gcc-toolset-14 for CFLAGS/LTO compatibility on RHEL 9
    dnf:
      name: gcc-toolset-14
      state: present
    when: ansible_distribution_major_version == "9"

  # percona-postgresql{{ major_version }}-devel ships a static
  # Makefile.global (baked in at the time Percona built postgres itself)
  # that every PGXS extension build, including this from-source postgis
  # build, inherits verbatim - re-running pg_config at postgis-build-time
  # does NOT re-derive these flags, they come straight from this file.
  #
  # CFLAGS includes GCC's own LTO flags (-flto=auto -ffat-lto-objects).
  # postgis's raster driver links C objects built by gcc-toolset-14's gcc
  # against C++ objects (Wagyu/FlatGeobuf) built with LLVM bitcode
  # (-flto=thin -emit-llvm) - mixing the two LTO formats in one link step
  # crashes the linker with "lto1: internal compiler error: in
  # return_token, at opts-common.cc:2177". Confirmed this is a genuine
  # consequence of this role's simplified `./configure` (no --enable-lto)
  # + plain `make` invocation, not an environment artifact: switching to
  # Percona's own official build recipe (--enable-lto, --with-projdir, the
  # staged make invocation from postgis/rpm/percona-postgis35.spec) made
  # the crash disappear WITHOUT touching CFLAGS at all, under the same
  # test conditions. Stripping just these two flags here (not the whole
  # CFLAGS, which would also wipe out needed -I include paths) is the
  # simpler fix given this role deliberately doesn't replicate the full
  # official recipe.
  #
  # (A second Makefile.global setting, with_llvm, was also patched to "no"
  # at one point after a local Docker repro showed `llvm-lto -thinlto
  # -thinlto-action=thinlink` segfaulting during installcheck's bitcode
  # staged-install step. A real-CI experiment (removing just that patch)
  # confirmed installcheck passes fine on real hardware with with_llvm
  # left enabled - the segfault only ever reproduced under local Docker
  # verification, which runs x86_64-on-arm64 under emulation on this Mac.
  # So that patch was emulation-specific, not a real RHEL9 issue, and has
  # been removed rather than kept as unnecessary weight.)
  #
  # This edit only affects this role's own from-source regression-testing
  # build environment - it does not touch the already-installed, already-
  # verified percona-postgis35_{{ major_version }} package under test.
  - name: Back up the stock Makefile.global before patching it
    ansible.builtin.copy:
      src: /usr/pgsql-{{ major_version }}/lib/pgxs/src/Makefile.global
      dest: /usr/pgsql-{{ major_version }}/lib/pgxs/src/Makefile.global.orig
      remote_src: true
      force: false

  # TEMPORARILY DISABLED for a second real-CI experiment (same spirit as the
  # with_llvm one above, which turned out to be a pure Docker-emulation
  # artifact): the "recipe-dependent, not emulation-dependent" conclusion
  # for this crash was only ever tested by varying the recipe while holding
  # emulation constant (both the failing and passing runs were under the
  # same --platform linux/amd64 Docker on this arm64 Mac) - never by
  # testing this role's actual simplified recipe on real, non-emulated
  # hardware. lto1 (GCC's own LTO codegen pass) is the same class of tool
  # as llvm-lto (complex, codegen-heavy) - exactly the kind emulation tends
  # to destabilize - so the same doubt applies here. If this run crashes
  # with "lto1: internal compiler error" too, restore this task - it's
  # proven necessary on real hardware. If make succeeds, this crash was
  # also emulation-specific and this task can stay removed.
  # - name: Strip GCC LTO flags from Makefile.global's CFLAGS (incompatible with LLVM-bitcode objects linked into the same .so)
  #   ansible.builtin.replace:
  #     path: /usr/pgsql-{{ major_version }}/lib/pgxs/src/Makefile.global
  #     regexp: '^(CFLAGS\s*=.*) -flto=auto -ffat-lto-objects(.*)$'
  #     replace: '\1\2'

  - name: Record the actual build-time library versions we're about to compile against
    shell: |
      export PATH="/usr/gdal311/bin:/usr/geos311/bin:$PATH"
      export PKG_CONFIG_PATH="/usr/gdal311/lib/pkgconfig:/usr/geos311/lib64/pkgconfig:/usr/proj95/lib64/pkgconfig"
      echo "geos-config:     $(geos-config --version 2>&1 || echo 'not found')"
      echo "gdal-config:     $(gdal-config --version 2>&1 || echo 'not found')"
      echo "gdalinfo formats: $(gdalinfo --formats 2>&1 | grep -i tif || echo 'no tif/GTiff driver')"
      echo "proj (pkg-config): $(pkg-config --modversion proj 2>&1 || echo 'not found')"
      echo "json-c (pkg-config): $(pkg-config --modversion json-c 2>&1 || echo 'not found')"
      echo "protobuf-c (pkg-config): $(pkg-config --modversion libprotobuf-c 2>&1 || echo 'not found')"
      echo "sfcgal (pkg-config): $(pkg-config --modversion sfcgal 2>&1 || echo 'not found')"
    args:
      executable: /bin/bash
    register: build_time_lib_versions
    changed_when: false
    ignore_errors: true

  - debug:
      msg: >-
        Build-time library versions (what we're about to compile postgis against):
        {{ build_time_lib_versions.stdout_lines }}
        --- compare this against the shipped package's ground truth reported above:
        {{ shipped_postgis_full_version.stdout }}
        --- a mismatch here (e.g. shipped GEOS="3.9.x" but geos-config reports 3.12.x) means
        this from-source build will not be representative of the actual shipped binary,
        even if it compiles and installcheck passes.

  - name: Clone postgis sources matching the packaged version
    git:
      repo: "{{ repo }}"
      version: "{{ version }}"
      dest: /tmp/postgis
    vars:
      repo: "{{ lookup('env', 'COMPONENT_REPO') }}"
      version: "{{ lookup('env', 'COMPONENT_VERSION') }}"
    become_user: postgres

  - name: Autogen postgis
    shell: ./autogen.sh
    args:
      chdir: /tmp/postgis
    become_user: postgres
    environment:
      PATH: "/usr/pgsql-{{ major_version }}/bin:{{ ansible_env.PATH }}"

  # gdal311/geos311/proj95 install to their own prefixes (/usr/gdal311,
  # /usr/geos311, /usr/proj95), not standard system paths - PATH/
  # PKG_CONFIG_PATH need these explicitly for ./configure's autodetection
  # to find gdal-config/geos-config/pkg-config files at all (SFCGAL and
  # json-c/protobuf-c use standard system paths already on the default
  # search path, no addition needed for those).
  - name: Configure postgis against the already-installed GEOS/PROJ/GDAL/SFCGAL/json-c libraries
    shell: |
      {% if ansible_distribution_major_version == "9" %}
      source /opt/rh/gcc-toolset-14/enable
      {% endif %}
      set -o pipefail
      ./configure 2>&1 | tee /tmp/postgis-configure.log
    args:
      chdir: /tmp/postgis
      executable: /bin/bash
    become_user: postgres
    environment:
      PATH: "/usr/gdal311/bin:/usr/geos311/bin:/usr/pgsql-{{ major_version }}/bin:{{ ansible_env.PATH }}"
      PKG_CONFIG_PATH: "/usr/gdal311/lib/pkgconfig:/usr/geos311/lib64/pkgconfig:/usr/proj95/lib64/pkgconfig:{{ ansible_env.PKG_CONFIG_PATH | default('') }}"
    register: postgis_configure
    ignore_errors: true

  - debug:
      var: postgis_configure.stdout_lines

  - name: Show config.log if configure failed (autotools records *why* a library wasn't detected here)
    shell: cat /tmp/postgis/config.log
    register: postgis_config_log
    when: postgis_configure is defined and postgis_configure.rc != 0
    ignore_errors: true
    become_user: postgres

  - debug:
      var: postgis_config_log.stdout_lines
    when: postgis_configure is defined and postgis_configure.rc != 0 and postgis_config_log is defined

  - name: Fail the playbook if postgis configure failed
    fail:
      msg: "postgis ./configure failed with return code {{ postgis_configure.rc }} - see config.log above"
    when: postgis_configure is defined and postgis_configure.rc != 0

  - name: Build postgis from source (compile-only - the installed package above is what installcheck validates)
    shell: |
      {% if ansible_distribution_major_version == "9" %}
      source /opt/rh/gcc-toolset-14/enable
      {% endif %}
      set -o pipefail
      make -j "$(nproc)" 2>&1 | tee /tmp/postgis-build.log
    args:
      chdir: /tmp/postgis
      executable: /bin/bash
    become_user: postgres
    environment:
      PATH: "/usr/gdal311/bin:/usr/geos311/bin:/usr/pgsql-{{ major_version }}/bin:{{ ansible_env.PATH }}"
    register: postgis_build
    ignore_errors: true

  - debug:
      var: postgis_build.stdout_lines

  - name: Fail the playbook if the postgis build failed
    fail:
      msg: "postgis `make` failed with return code {{ postgis_build.rc }} - see build log above"
    when: postgis_build is defined and postgis_build.rc != 0

  - name: Run the PostGIS regression suite against the installed package
    shell: |
      {% if ansible_distribution_major_version == "9" %}
      source /opt/rh/gcc-toolset-14/enable
      {% endif %}
      set -o pipefail
      make installcheck 2>&1 | tee /tmp/postgis-installcheck.log
    args:
      chdir: /tmp/postgis
      executable: /bin/bash
    become_user: postgres
    environment:
      PATH: "/usr/gdal311/bin:/usr/geos311/bin:/usr/pgsql-{{ major_version }}/bin:{{ ansible_env.PATH }}"
    register: postgis_installcheck
    ignore_errors: true

  - debug:
      var: postgis_installcheck.stdout_lines

  - name: Find regression diff/error files if the suite failed
    # A prior run failed 14 raster loader tests ("running raster2pgsql:
    # /tmp/pgis_reg/loader.err") but this task only searched /tmp/postgis
    # for *.diffs - the regress harness's own working directory
    # (/tmp/pgis_reg) is a completely different path, and .err files (the
    # loader's own stderr capture) were never looked for at all, so we
    # never actually saw why raster2pgsql failed. Search both known
    # directories and both file patterns now.
    shell: >
      find /tmp/postgis /tmp/pgis_reg \( -name "*.diffs" -o -name "*.err" \)
      -exec sh -c 'echo "=== {} ==="; cat "{}"' \; 2>/dev/null
    register: postgis_diffs
    when: postgis_installcheck is defined and postgis_installcheck.rc != 0
    ignore_errors: true
    become_user: postgres

  - debug:
      var: postgis_diffs.stdout_lines
    when: postgis_installcheck is defined and postgis_installcheck.rc != 0 and postgis_diffs is defined

  # Kept as an ongoing safety net (not because this is still an open
  # question - reproduced and root-caused directly in a local Rocky 9 Docker
  # container matching this AMI: gdal311 has full GTiff/COG support and is
  # what's now installed above). If this ever fires again in CI, it means
  # something about the environment has drifted from what was verified.
  - name: Diagnose raster2pgsql's ability to read a real test raster directly (bypassing the regress harness)
    shell: |
      export PATH="/usr/gdal311/bin:/usr/geos311/bin:$PATH"
      echo "=== gdalinfo --version ==="
      gdalinfo --version 2>&1 || echo "gdalinfo not found or failed"
      echo "=== gdalinfo --formats (checking for GTiff driver specifically) ==="
      gdalinfo --formats 2>&1 | grep -i tif || echo "no tif/GTiff driver listed (or gdalinfo unavailable)"
      echo "=== gdalinfo on the failing test raster ==="
      gdalinfo /tmp/postgis/raster/test/regress/loader/testraster2.tif 2>&1 || echo "gdalinfo failed to read the file, rc=$?"
      echo "=== freshly-built raster2pgsql on the same file ==="
      /tmp/postgis/raster/loader/raster2pgsql /tmp/postgis/raster/test/regress/loader/testraster2.tif diag_raster_check 2>&1 || echo "raster2pgsql failed, rc=$?"
    args:
      executable: /bin/bash
    register: postgis_raster_diag
    when: postgis_installcheck is defined and postgis_installcheck.rc != 0
    ignore_errors: true
    become_user: postgres

  - debug:
      var: postgis_raster_diag.stdout_lines
    when: postgis_installcheck is defined and postgis_installcheck.rc != 0 and postgis_raster_diag is defined

  - name: Fail the playbook if the postgis regression suite failed
    fail:
      msg: "PostGIS installcheck failed with return code {{ postgis_installcheck.rc }} - see regression diffs above"
    when: postgis_installcheck is defined and postgis_installcheck.rc != 0
