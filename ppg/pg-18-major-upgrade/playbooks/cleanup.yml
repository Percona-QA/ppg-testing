---
- name: Fix broken
  hosts: all
  become: true
  become_method: sudo
  tasks:
    - name: Fix Postgresql-17 deb packages
      apt:
        name: "{{ packages }}"
        state: fixed
        update_cache: true
      vars:
        packages:
          - percona-postgresql-17
          - percona-postgresql-17-dbgsym
          - percona-postgresql-client-17
          - percona-postgresql-doc-17
          - percona-postgresql-plperl-17
          - percona-postgresql-plpython3-17
          - percona-postgresql-pltcl-17
          - percona-postgresql-server-dev-17
          - percona-postgresql-client-17-dbgsym
          - percona-postgresql-plperl-17-dbgsym
          - percona-postgresql-plpython3-17-dbgsym
          - percona-postgresql-pltcl-17-dbgsym
          - percona-pg-stat-monitor17
          - percona-pgaudit17-set-user
          - percona-postgresql-17-wal2json
      ignore_errors: true
      when: ansible_os_family == "Debian"

- name: Cleanup
  hosts: all
  become: true
  become_method: sudo
  tasks:
    - name: Remove PG17 extension and add-on packages first
      apt:
        name: "{{ packages }}"
        state: absent
        update_cache: true
      ignore_errors: true
      vars:
        packages:
          - percona-postgresql-17-pgaudit
          - percona-postgresql-17-pgaudit-dbgsym
          - percona-postgresql-17-repack
          - percona-postgresql-17-repack-dbgsym
          - percona-postgresql-17-postgis-3
          - percona-postgresql-17-wal2json
          - percona-postgresql-17-wal2json-dbgsym
          - percona-pg-stat-monitor17
          - percona-pg-stat-monitor17-dbgsym
          - percona-pgaudit17-set-user
          - percona-pgaudit17-set-user-dbgsym
          - percona-pg-telemetry17
          - percona-postgresql-postgis
          - percona-postgresql-postgis-scripts
      when: ansible_os_family == "Debian"

    - name: Remove core PG17 deb packages
      apt:
        name: "{{ packages }}"
        state: absent
      ignore_errors: true
      vars:
        packages:
          - percona-postgresql-17
          - percona-postgresql-17-dbgsym
          - percona-postgresql-client-17
          - percona-postgresql-doc-17
          - percona-postgresql-plperl-17
          - percona-postgresql-plpython3-17
          - percona-postgresql-pltcl-17
          - percona-postgresql-server-dev-17
          - percona-postgresql-client-17-dbgsym
          - percona-postgresql-plperl-17-dbgsym
          - percona-postgresql-plpython3-17-dbgsym
          - percona-postgresql-pltcl-17-dbgsym
      when: ansible_os_family == "Debian"

    - name: Fix any remaining broken packages after PG17 removal
      shell: apt-get -f install -y
      args:
        executable: /bin/bash
      ignore_errors: true
      when: ansible_os_family == "Debian"

    - name: remove Postgresql rpm packages
      yum:
        name: "{{ packages }}"
        state: absent
      vars:
        packages:
          - percona-postgresql17
          - percona-postgresql17-contrib
          - percona-postgresql17-debuginfo
          - percona-postgresql17-devel
          - percona-postgresql17-docs
          - percona-postgresql17-libs
          - percona-postgresql17-llvmjit
          - percona-postgresql17-plperl
          - percona-postgresql17-plpython
          - percona-postgresql17-pltcl
          - percona-postgresql17-server
          - percona-postgresql17-test
          - percona-postgresql17-debugsource
          - percona-postgresql17-devel-debuginfo
          - percona-postgresql17-libs-debuginfo
          - percona-postgresql17-plperl-debuginfo
          - percona-postgresql17-plpython-debuginfo
          - percona-postgresql17-plpython3-debuginfo
          - percona-postgresql17-pltcl-debuginfo
          - percona-postgresql17-server-debuginfo
      ignore_errors: true
      when: ansible_os_family == "RedHat"

    - name: remove pg_repack rpm packages
      yum:
        name: percona-pg_repack17
        state: absent
      ignore_errors: true
      when: ansible_os_family == "RedHat"
