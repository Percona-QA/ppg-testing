---
# Tasks for test major upgrade for PPG 17 packages.
#
# FROM_VERSION also accepts psp-16.14 (scenario: PSP-16 -> PPG-17) — the FROM
# side just gets pg_tde installed on top of the identical ppg-16 package set
# (psp-16 ships the same postgresql16 packages, from a different repo
# channel); the pg_upgrade/port-swap/restart mechanics below are unchanged
# either way since the TO side is always plain ppg-17.

- name: Configure repository
  include_tasks: ../../../tasks/install_percona_release.yml

- name: setup epel release
  yum:
    name: epel-release
    update_cache: yes
    state: present
  when: ansible_os_family == "RedHat"

- name: Setting facts so that they will be persisted in the fact cache
  ansible.builtin.set_fact:
    pg_version_to_install: "{{ lookup('env', 'FROM_VERSION') | regex_replace('^(?:ppg|psp)-', '') }}"
    upgrade_to_pg_version: "{{ lookup('env', 'VERSION') | regex_replace('^(?:ppg|psp)-', '') }}"
    # psp only ships one repo per major version (psp-16), no psp-16.xx minor
    # repos exist, unlike ppg (ppg-16.14 etc.) — trim the minor for psp only.
    from_repo_version: "{{ lookup('env', 'FROM_VERSION').split('.')[0] if lookup('env', 'FROM_VERSION').startswith('psp-') else lookup('env', 'FROM_VERSION') }}"

- name: End play on Ubuntu 26 and versions older than 16.14
  meta: end_host
  when: ansible_distribution == "Ubuntu" and
    ansible_distribution_major_version == "26" and
    pg_version_to_install | string is version('16.14', '<', strict=True)

- name: End play on Debian 13
  meta: end_play
  when: ansible_distribution == "Debian" and
   ansible_distribution_major_version == "13" and
   pg_version_to_install | string is version('16.10', '<=', strict=True)

- name: End play on Ubuntu 24
  meta: end_play
  when: ansible_distribution == "Ubuntu" and
   ansible_distribution_major_version == "24" and
   pg_version_to_install | string is version('16.2', '<=', strict=True)

- name: End play on RedHat 10 and 16.9 and older versions
  fail:
    msg: "Stopping execution on rhel 10 because 16.9 and below are not supported."
  when: ansible_os_family == "RedHat" and
   ansible_distribution_major_version == "10" and
   pg_version_to_install | string is version('16.9', '<=', strict=True)

- name: Setup initial (old) repository
  command: percona-release enable {{ from_repo_version }} {{ repo }}
  vars:
    repo: "{{ lookup('env', 'FROM_REPO') }}"

- name: install Percona Platform for PostgreSQL 16 packages
  include_tasks: ../../../../tasks/install_ppg16.yml

- name: Initialize Postgres RHEL
  command: /usr/pgsql-16/bin/postgresql-16-setup initdb
  environment:
    PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  when: ansible_os_family == "RedHat"

- name: Install PPG tools
  include_tasks: ../../../../tasks/install_ppg16_tools.yml

- name: Install pg_tde packages RHEL (PSP-16 FROM version only)
  yum:
    name: "{{ packages }}"
    state: latest
    update_cache: yes
  vars:
    packages:
      - percona-pg_tde16
      - percona-pg_tde16-devel
      - percona-pg_tde16-debugsource
      - percona-pg_tde16-debuginfo
  when:
    - ansible_os_family == "RedHat"
    - lookup('env', 'FROM_VERSION').startswith('psp-')

- name: Install pg_tde packages Debian (PSP-16 FROM version only)
  apt:
    name: "{{ packages }}"
    state: latest
    update_cache: yes
  vars:
    packages:
      - percona-pg-tde16
      - percona-pg-tde16-client
      - percona-pg-tde16-dbgsym
  when:
    - ansible_os_family == "Debian"
    - lookup('env', 'FROM_VERSION').startswith('psp-')

- name: Start Postgres RHEL
  include_tasks: ../../../../tasks/start_postgres_with_diagnostics.yml
  vars:
    svc_name: postgresql-16
    svc_state: started
  when: ansible_os_family == "RedHat"

- name: Start postgresql service for Debian based
  include_tasks: ../../../../tasks/start_postgres_with_diagnostics.yml
  vars:
    svc_name: postgresql
    svc_state: started
  when: ansible_os_family == "Debian"

- name: Seed data-integrity baseline before upgrade
  include_tasks: ../../../../tasks/seed_data_integrity.yml

- name: Disable old repository
  command: percona-release disable {{ from_repo_version }} {{ repo }}
  vars:
    repo: "{{ lookup('env', 'FROM_REPO') }}"

- name: Setup new repository
  command: percona-release enable-only {{ pg_version }} {{ repo }}
  vars:
    repo: "{{ lookup('env', 'TO_REPO') }}"
    pg_version: "{{ lookup('env', 'VERSION') }}"

- name: install Percona Platform for PostgreSQL deb packages
  apt:
    name: "{{ packages }}"
    update_cache: yes
    state: latest
  vars:
    packages:
      - percona-postgresql
      - percona-postgresql-17
      - percona-postgresql-all
      - percona-postgresql-client
      - percona-postgresql-client-17
      - percona-postgresql-common
      - percona-postgresql-contrib
      - percona-postgresql-doc
      - percona-postgresql-doc-17
      - percona-postgresql-plperl-17
      - percona-postgresql-plpython3-17
      - percona-postgresql-pltcl-17
      - percona-postgresql-server-dev-17
      - percona-postgresql-common-dev
      - percona-postgresql-17-dbgsym
      - percona-postgresql-client-17-dbgsym
      - percona-postgresql-plperl-17-dbgsym
      - percona-postgresql-plpython3-17-dbgsym
      - percona-postgresql-pltcl-17-dbgsym
      - postgresql-client-common
      - postgresql-common
  when: ansible_os_family == "Debian"
  environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

# - name: install Percona Platform for PostgreSQL deb packages
#   apt:
#     name: "{{ packages }}"
