---
- name: Setting facts so that they will be persisted in the fact cache
  ansible.builtin.set_fact:
    pg_version_to_install: "{{ lookup('env', 'VERSION') | replace('ppg-','') }}"

- name: End play on Ubuntu 26 and versions older than 15.18
  meta: end_host
  when: ansible_distribution == "Ubuntu" and
    ansible_distribution_major_version == "26" and
    pg_version_to_install | string is version('15.18', '<', strict=True)

- name: Configure repository
  include_tasks: ../../../../tasks/enable_repo.yml

- name: install Percona Platform for PostgreSQL 15 packages
  include_tasks: ../../../../tasks/install_ppg_meta_ha.yml

- name: Initialize Postgres RHEL
  command: /usr/pgsql-15/bin/postgresql-15-setup initdb
  environment:
    PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  when: ansible_os_family == "RedHat"

- name: Start Postgres RHEL
  include_tasks: ../../../../tasks/start_postgres_with_diagnostics.yml
  vars:
    svc_name: postgresql-15
    svc_state: started
  when: ansible_os_family == "RedHat"
