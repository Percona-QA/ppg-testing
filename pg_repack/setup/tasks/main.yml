---
- name: Set Facts - Major version
  set_fact:
    major_version: "{{ lookup('env', 'VERSION').split('.')[0].split('-')[1] }}"
    cacheable: true

- name: Set Facts - PG ENV variables
  ansible.builtin.set_fact:
    PGVERSION: "{{ major_version }}"
    PGBIN:  "/usr/lib/postgresql/{{ major_version }}/bin"
    PGDATA: "/var/lib/postgresql/{{ major_version }}/test"
    PATH: "$PATH:$PGBIN"

- name: Configure repository
  include_tasks: ../../../../tasks/enable_repo.yml

- name: Install Dependencies on Debian
  apt:
    name: "{{ packages }}"
    update_cache: yes
    state: latest
  vars:
    packages:
      - libreadline6-dev
      - systemtap-sdt-dev
      - zlib1g-dev
      - libssl-dev
      - libpam0g-dev
      - python3-dev
      - bison
      - flex
      - libipc-run-perl
      - libtext-trim-perl
      - wget
      - gnupg
      - tzdata
      - locales
      - lsb-release
      - apt-utils
      - make
      - gcc
      - libssl-dev
      - libkrb5-dev
      - gnupg2
      - curl
      - lsb-release
      - libz-dev
      - liblz4-dev
      - libcurl4-openssl-dev
      - build-essential
      - libpq-dev
      - libxml2-dev
      - libreadline-dev
      - libssl-dev
      - liblz4-dev
      - libnuma-dev
      - libzstd-dev

- name: install Percona Platform for PostgreSQL deb packages
  apt:
    name: "{{ packages }}"
    update_cache: yes
    state: latest
  vars:
    major_version: "{{ major_version }}"
    packages:
    - percona-postgresql
    - percona-postgresql-{{ major_version }}
    - percona-postgresql-all
    - percona-postgresql-client
    - percona-postgresql-client-{{ major_version }}
    - percona-postgresql-common
    - percona-postgresql-contrib
    - percona-postgresql-doc
    - percona-postgresql-doc-{{ major_version }}
    - percona-postgresql-plperl-{{ major_version }}
    - percona-postgresql-plpython3-{{ major_version }}
    - percona-postgresql-pltcl-{{ major_version }}
    - percona-postgresql-server-dev-{{ major_version }}
    - percona-postgresql-server-dev-all
    - percona-postgresql-{{ major_version }}-dbgsym
    - percona-postgresql-client-{{ major_version }}-dbgsym
    - percona-postgresql-plperl-{{ major_version }}-dbgsym
    - percona-postgresql-plpython3-{{ major_version }}-dbgsym
    - percona-postgresql-pltcl-{{ major_version }}-dbgsym
  environment:
    PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

- name: Install pg_repack Debian
  apt:
    name: "{{ packages }}"
    state: latest
    update_cache: yes
  vars:
    packages:
      - percona-postgresql-{{ major_version }}-repack
      - percona-postgresql-{{ major_version }}-repack-dbgsym
  environment:
    PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

- name: Clone pg_repack sources
  git:
    repo: "{{ repo }}"
    version: "{{ version }}"
    dest: /tmp/pg_repack
  vars:
    repo: "{{ lookup('env', 'COMPONENT_REPO') }}"
    version: "{{ lookup('env', 'COMPONENT_VERSION') }}"
  become_user: postgres

- name: Add postgres to sudoers
  become: true 
  lineinfile:
      path: /etc/sudoers
      state: present
      line: 'postgres ALL=(ALL) NOPASSWD: ALL'
      validate: 'visudo -cf %s'

- name: Stop postgresql service for Debian based
  include_tasks: ../../../../tasks/start_postgres_with_diagnostics.yml
  vars:
    svc_name: postgresql
    svc_state: stopped

- name: Build pg_repack from sources (compile-only sanity check, packaged binary installed above is what installcheck runs against)
  make:
    chdir: "/tmp/pg_repack"
    params:
      USE_PGXS: 1
  become_user: postgres

# Deliberately not running `make install` here: the packaged pg_repack
# installed above is the artifact we want installcheck to validate, not a
# from-source build that would silently overwrite it. The package already
# ships the pg_repack binary at /usr/lib/postgresql/{{ major_version }}/bin/pg_repack.

- name: Create a symbolic link
  become: true
  ansible.builtin.file:
    src: /usr/lib/postgresql/{{ major_version }}/bin/pg_repack
    dest: /usr/bin/pg_repack
    state: link

- name: Do Initdb
  become: true
  command: "sudo -u postgres {{ PGBIN }}/initdb -A trust -k {{ PGDATA }}"

- name: Start Server
  become_user: postgres
  command: "{{ PGBIN }}/pg_ctl -w -l {{ PGDATA }}/server.log start -D {{ PGDATA }}"
  register: pg_start_result
  ignore_errors: true

- name: Dump postgres server log if Start Server failed
  include_tasks: ../../../../tasks/dump_logs.yml
  vars:
    log_files:
      - "{{ PGDATA }}/server.log"
  when: pg_start_result is failed

- name: Fail if Start Server failed
  fail:
    msg: "pg_ctl start failed (rc={{ pg_start_result.rc | default('unknown') }}): {{ pg_start_result.stderr | default('') }}"
  when: pg_start_result is failed

- name: Create tablesspace and folders
  script: create_tablespaces.sh
  become: true
  register: results

- debug: var=results.stdout_lines

- name: Test pg_repack
  make:
    target: installcheck
    chdir: "/tmp/pg_repack"
    params:
      USE_PGXS: 1
  become_user: postgres
  ignore_errors: true
  register: installcheck

- debug: var=installcheck.stdout_lines

- name: Show regression.diffs if installcheck failed
  shell: cat /tmp/pg_repack/regression.diffs
  register: diffs_output
  when:
    - installcheck is failed
  ignore_errors: true

- debug:
    msg: "{{ diffs_output.stdout_lines }}"
  when:
    - installcheck is failed
    - diffs_output is defined

- name: Set pg_repack artifact filename
  set_fact:
    artifact_filename: "pg_repack-{{ lookup('env','VERSION') }}-{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}-{{ ansible_architecture }}-build{{ lookup('env','BUILD_NUMBER') }}.tar.gz"
  when:
    - installcheck is failed

- name: Package and fetch pg_repack failure artifacts to controller
  shell: |
    set -uo pipefail
    ARTIFACT_BASENAME="{{ artifact_filename | default('') | replace('.tar.gz', '') }}"
    ARTIFACT_DIR="/tmp/$ARTIFACT_BASENAME"
    rm -rf "$ARTIFACT_DIR"
    mkdir -p "$ARTIFACT_DIR"
    find /tmp/pg_repack -name "regression.diffs" -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
    find /tmp/pg_repack -name "regression.out" -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
    find /var/log/postgresql -name "*.log" -type f -exec cp --parents {} "$ARTIFACT_DIR/" \; 2>/dev/null || true
    tar -czf "/tmp/{{ artifact_filename | default('pg_repack-artifacts.tar.gz') }}" -C /tmp "$ARTIFACT_BASENAME"
  args:
    executable: /bin/bash
  when:
    - installcheck is failed
  ignore_errors: true
  become: true

- name: Fetch pg_repack failure artifacts to controller
  fetch:
    src: "/tmp/{{ artifact_filename }}"
    dest: "{{ playbook_dir }}/../artifacts/"
    fail_on_missing: false
  when:
    - installcheck is failed
  become: true

- name: Fail the playbook if installcheck failed
  fail:
    msg: "pg_repack installcheck failed with return code {{ installcheck.rc | default('unknown - see debug output above') }}"
  when:
    - installcheck is failed
